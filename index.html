<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unified Dealer Signature Pro</title>
    <style>
        :root { --bg: #0b0f19; --panel: #161e2d; --accent: #38bdf8; --green: #10b981; --red: #ef4444; --black: #1e293b; --text: #f1f5f9; --gold: #fbbf24; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .dashboard { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1fr 400px; gap: 20px; }
        
        /* Table Layout */
        .table-section { background: #064e3b; padding: 20px; border-radius: 15px; border: 4px solid #065f46; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .roulette-board { display: flex; align-items: stretch; }
        .zero-container { width: 60px; background: var(--green); border: 2px solid white; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; cursor: pointer; border-radius: 8px 0 0 8px; }
        .numbers-grid { display: grid; grid-template-columns: repeat(12, 1fr); grid-template-rows: repeat(3, 1fr); gap: 2px; flex-grow: 1; margin-left: 4px; }
        .cell { height: 50px; border: 1px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 2px; }
        .r { background: var(--red); } .b { background: var(--black); }

        /* Unified Prediction Hero */
        .prediction-hero { background: linear-gradient(145deg, #1e293b, #0f172a); border: 2px solid var(--accent); border-radius: 15px; padding: 30px; text-align: center; position: relative; overflow: hidden; }
        .prediction-hero::before { content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(56,189,248,0.1) 0%, transparent 70%); pointer-events: none; }
        #target-display { font-size: 5rem; font-weight: 900; color: var(--gold); text-shadow: 0 0 20px rgba(251, 191, 36, 0.4); margin: 10px 0; line-height: 1; }
        .hero-label { font-size: 0.8rem; letter-spacing: 3px; color: var(--accent); font-weight: bold; }
        
        /* Data & Stats */
        .panel { background: var(--panel); border-radius: 12px; padding: 20px; border: 1px solid #2d3748; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .stat-card { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; border-left: 3px solid var(--accent); }
        .stat-val { display: block; font-size: 1.1rem; font-weight: bold; color: var(--text); }
        .stat-label { font-size: 0.7rem; opacity: 0.6; text-transform: uppercase; }

        .log-wrap { height: 250px; overflow-y: auto; margin-top: 15px; border: 1px solid #2d3748; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { background: #1e293b; padding: 10px; text-align: center; color: var(--accent); }
        td { padding: 8px; text-align: center; border-bottom: 1px solid #2d3748; }

        .bulk-area { width: 100%; height: 80px; background: #0b0f19; color: var(--accent); border: 1px solid #475569; border-radius: 8px; padding: 10px; font-family: monospace; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: #0b0f19; margin-top: 10px; }
        .btn-danger { background: transparent; color: #ef4444; border: 1px solid #ef4444; margin-top: 20px; }
        .btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
    </style>
</head>
<body>

<div class="dashboard">
    <div>
        <div class="prediction-hero">
            <div class="hero-label">OPTIMIZED PREDICTION</div>
            <div id="target-display">--</div>
            <div id="prediction-info" style="font-size: 0.9rem; opacity: 0.8;">Enter 3+ results to start</div>
        </div>

        <div class="table-section" style="margin-top: 20px;">
            <div class="roulette-board">
                <div class="zero-container" onclick="track(0)">0</div>
                <div id="boardGrid" class="numbers-grid"></div>
            </div>
        </div>

        <div class="panel" style="margin-top: 20px;">
            <h2 style="margin:0; font-size: 1rem;">LIVE STREAM ANALYTICS</h2>
            <div class="log-wrap">
                <table>
                    <thead>
                        <tr><th>Spin</th><th>Result</th><th>Category</th><th>Dist</th><th>Trend</th></tr>
                    </thead>
                    <tbody id="logTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div>
        <div class="panel">
            <h2 style="margin:0; font-size: 1rem;">SMART SIGNATURE ENGINE</h2>
            
            <div class="stat-grid">
                <div class="stat-card"><span class="stat-label">Category Match</span><span id="stat-cat" class="stat-val">-</span></div>
                <div class="stat-card"><span class="stat-label">Weighted Avg</span><span id="stat-avg" class="stat-val">0.0</span></div>
            </div>

            <div style="margin-top: 25px;">
                <label class="stat-label">Bulk History Import</label>
                <textarea id="bulkData" class="bulk-area" placeholder="23, 4, 25, 14, 12, 33..."></textarea>
                <button class="btn btn-primary" onclick="importHistory()">CALCULATE SIGNATURE</button>
            </div>

            <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #2d3748;">
                <div class="stat-line" style="display:flex; justify-content: space-between;">
                    <span class="stat-label">Total Sample:</span>
                    <span id="total-count" style="font-weight:bold;">0</span>
                </div>
                <button class="btn btn-danger" onclick="resetSession()">RESET ENGINE</button>
            </div>
        </div>
    </div>
</div>

<script>
    const wheelOrder = [0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26];
    const reds = [1, 3, 5, 7, 9, 12, 14, 16, 18, 19, 21, 23, 25, 27, 30, 32, 34, 36];
    
    let history = []; 

    function getCategory(n) {
        if (n === 0) return "ZERO";
        return (reds.includes(n) ? "RED " : "BLK ") + (n <= 18 ? "LOW" : "HIGH");
    }

    function buildBoard() {
        const grid = document.getElementById('boardGrid');
        const rows = [[3,6,9,12,15,18,21,24,27,30,33,36],[2,5,8,11,14,17,20,23,26,29,32,35],[1,4,7,10,13,16,19,22,25,28,31,34]];
        rows.forEach(rowArr => {
            rowArr.forEach(n => {
                const cell = document.createElement('div');
                cell.className = `cell ${n===0?'g':(reds.includes(n)?'r':'b')}`;
                cell.innerText = n;
                cell.onclick = () => track(n);
                grid.appendChild(cell);
            });
        });
    }

    function track(num) {
        let dist = null;
        if (history.length > 0) {
            const lastNum = history[history.length - 1].num;
            dist = (wheelOrder.indexOf(num) - wheelOrder.indexOf(lastNum) + 37) % 37;
        }
        history.push({ num, type: getCategory(num), dist });
        calculateUnifiedPrediction();
    }

    function calculateUnifiedPrediction() {
        if (history.length < 2) {
            updateUI("--", 0, "-");
            return;
        }

        const latest = history[history.length - 1];
        const currentType = latest.type;
        
        // Filter distances for the SAME category (Color + Range)
        const categoryDists = history.filter(h => h.type === currentType && h.dist !== null).map(h => h.dist);
        // All recent distances for global dealer speed
        const globalDists = history.filter(h => h.dist !== null).map(h => h.dist);

        let finalAvg = 0;
        
        if (categoryDists.length >= 2) {
            // WEIGHTED LOGIC: 70% Specific Category Average, 30% Global Average
            const catAvg = categoryDists.reduce((a,b) => a+b, 0) / categoryDists.length;
            const globAvg = globalDists.reduce((a,b) => a+b, 0) / globalDists.length;
            finalAvg = (catAvg * 0.7) + (globAvg * 0.3);
        } else {
            // Fallback to global average if category data is thin
            finalAvg = globalDists.reduce((a,b) => a+b, 0) / globalDists.length;
        }

        const lastIdx = wheelOrder.indexOf(latest.num);
        const predIdx = (lastIdx + Math.round(finalAvg)) % 37;
        
        updateUI(wheelOrder[predIdx], finalAvg, currentType);
    }

    function updateUI(pred, avg, type) {
        document.getElementById('target-display').innerText = pred;
        document.getElementById('stat-avg').innerText = avg.toFixed(2);
        document.getElementById('stat-cat').innerText = type;
        document.getElementById('total-count').innerText = history.length;
        document.getElementById('prediction-info').innerText = `Based on ${type} signature + dealer speed`;

        const tbody = document.getElementById('logTable');
        tbody.innerHTML = '';
        [...history].reverse().forEach((entry, i) => {
            const trend = entry.dist > 18 ? "LONG" : (entry.dist !== null ? "SHORT" : "-");
            tbody.innerHTML += `<tr>
                <td>${history.length - i}</td>
                <td style="color:${reds.includes(entry.num)?'#ef4444':'#94a3b8'}"><b>${entry.num}</b></td>
                <td>${entry.type}</td>
                <td>${entry.dist !== null ? entry.dist : '-'}</td>
                <td>${trend}</td>
            </tr>`;
        });
    }

    function importHistory() {
        const raw = document.getElementById('bulkData').value;
        const nums = raw.split(/[\s,]+/).map(Number).filter(n => !isNaN(n) && n >= 0 && n <= 36);
        nums.forEach(n => track(n));
        document.getElementById('bulkData').value = '';
    }

    function resetSession() {
        history = [];
        updateUI("--", 0, "-");
        document.getElementById('logTable').innerHTML = '';
    }

    buildBoard();
</script>
</body>
</html>
