<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Roulette Master - Dual Sector Engine</title>
    <style>
        :root { --bg: #05070f; --panel: #0b111e; --accent: #38bdf8; --green: #10b981; --red: #ef4444; --black: #010206; --text: #f1f5f9; --gold: #fbbf24; --orange: #f97316; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .dashboard { max-width: 1550px; margin: 0 auto; display: grid; grid-template-columns: 1fr 420px; gap: 20px; }
        
        .setup-panel { background: var(--panel); border: 1px solid #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 20px; grid-column: 1 / -1; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
        .textarea-input { width: 100%; height: 70px; background: #05070f; border: 1px solid #334155; border-radius: 6px; color: white; padding: 10px; font-size: 1rem; box-sizing: border-box; resize: none; }
        
        .controls { display: flex; gap: 15px; margin-top: 10px; align-items: center; flex-wrap: wrap; }
        .select-input { background: #05070f; color: white; border: 1px solid #334155; padding: 10px 15px; border-radius: 6px; font-weight: bold; font-size: 0.95rem; cursor: pointer; }

        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--panel); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #1e293b; }
        .stat-val { display: block; font-size: 1.8rem; font-weight: 800; line-height: 1.2; }
        .label-stat { font-size: 0.72rem; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; }

        .hero { background: linear-gradient(145deg, #1e293b, #010206); border: 2px solid var(--accent); border-radius: 15px; padding: 25px; text-align: center; margin-bottom: 20px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; align-items: center; }
        .hero-section { border-right: 1px solid #1e293b; padding: 0 10px; }
        .hero-section:last-child { border-right: none; }
        .predict-title { font-size: 0.75rem; text-transform: uppercase; color: #94a3b8; letter-spacing: 1px; }
        .predict-val { font-size: 1.4rem; font-weight: 900; color: var(--gold); margin-top: 5px; }
        .sub-tag { font-size: 0.85rem; color: var(--accent); font-weight: bold; margin-top: 4px; }
        
        .chart-box { background: var(--panel); border: 1px solid #1e293b; border-radius: 12px; padding: 15px; margin-bottom: 20px; }
        .canvas-container { position: relative; width: 100%; height: 160px; background: #010206; border-radius: 8px; border: 1px solid #1e293b; overflow: hidden; }
        
        .roulette-container { background: #064e3b; padding: 15px; border-radius: 12px; border: 4px solid #065f46; display: flex; margin-bottom: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.6); }
        .zero-cell { width: 55px; background: var(--green); border: 1px solid rgba(255,255,255,0.3); display: flex; align-items: center; justify-content: center; font-size: 1.6rem; font-weight: bold; cursor: pointer; border-radius: 6px 0 0 6px; }
        .grid-rows { display: flex; flex-direction: column; gap: 4px; flex-grow: 1; margin-left: 4px; }
        .grid-row { display: grid; grid-template-columns: repeat(12, 1fr); gap: 4px; }
        .grid-cell { height: 48px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; border-radius: 4px; border: 1px solid rgba(255,255,255,0.15); font-size: 1.15rem; transition: all 0.1s; }
        .r-num { background: var(--red); color: white; }
        .b-num { background: var(--black); color: white; }

        .panel { background: var(--panel); border-radius: 12px; padding: 20px; border: 1px solid #1e293b; }
        .log-area { height: 480px; overflow-y: auto; background: #05070f; border-radius: 8px; border: 1px solid #1e293b; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { background: #0b111e; padding: 12px; position: sticky; top: 0; color: var(--accent); border-bottom: 2px solid #1e293b; }
        td { padding: 11px; text-align: center; border-bottom: 1px solid #0b111e; }
        
        .btn { padding: 11px 22px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; background: var(--accent); color: #05070f; }
        .btn-danger { background: var(--red); color: white; }
        .btn-success { background: var(--green); color: white; }
        
        .win-text { color: var(--green); font-weight: bold; }
        .loss-text { color: var(--red); font-weight: bold; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="setup-panel">
        <h2 style="margin:0 0 10px 0; font-size: 1.1rem; color: var(--accent);">ROULETTE DUAL-STREET COLLECTIVE ENGINE</h2>
        <textarea id="bulkData" class="textarea-input" placeholder="Paste history here..."></textarea>
        <div class="controls">
            <button class="btn" onclick="processData(false)">Seed Numbers</button>
            <button class="btn btn-success" onclick="processData(true)">Run Simulation</button>
        </div>
    </div>

    <div>
        <div class="stats-row">
            <div class="stat-card"><span class="label-stat">Spins</span><span id="s-cnt" class="stat-val">0</span></div>
            <div class="stat-card"><span class="label-stat">Wins</span><span id="s-win" class="stat-val" style="color:var(--green)">0</span></div>
            <div class="stat-card"><span class="label-stat">Losses</span><span id="s-loss" class="stat-val" style="color:var(--red)">0</span></div>
            <div class="stat-card"><span class="label-stat">Max Loss Streak</span><span id="s-max-loss" class="stat-val" style="color:var(--gold)">0</span></div>
        </div>

        <div class="hero">
            <div class="hero-section">
                <div class="predict-title">Best Low Street (1-18)</div>
                <div id="p-under" class="predict-val" style="color:var(--accent)">--</div>
                <div class="sub-tag">Collective High Hit</div>
            </div>
            <div class="hero-section">
                <div class="predict-title">Best High Street (19-36)</div>
                <div id="p-over" class="predict-val" style="color:var(--orange)">--</div>
                <div class="sub-tag">Collective High Hit</div>
            </div>
            <div class="hero-section">
                <div class="predict-title">Current Play (Dual)</div>
                <div id="p-main" class="predict-val">--</div>
                <div class="sub-tag" id="p-main-tag">Low + High Selection</div>
            </div>
        </div>

        <div class="chart-box">
            <div class="canvas-container">
                <canvas id="travelChart"></canvas>
            </div>
        </div>

        <div class="roulette-container">
            <div class="zero-cell" onclick="addSingleSpin(0)">0</div>
            <div id="rouletteGrid" class="grid-rows"></div>
        </div>
    </div>

    <div class="panel">
        <h2 style="margin:0 0 15px 0; font-size: 1rem; color: var(--accent);">LOG MATRIX</h2>
        <div class="log-area">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Num</th>
                        <th>Low Selection</th>
                        <th>High Selection</th>
                        <th>Result</th>
                    </tr>
                </thead>
                <tbody id="logTable"></tbody>
            </table>
        </div>
        <button class="btn btn-danger" style="width:100%; margin-top:15px;" onclick="resetAll()">RESET</button>
    </div>
</div>

<script>
    const reds = [1, 3, 5, 7, 9, 12, 14, 16, 18, 19, 21, 23, 25, 27, 30, 32, 34, 36];
    let rawNumbers = [];
    let trackedPredictions = []; 
    let totalWins = 0, totalLosses = 0, maxLossStreak = 0, currentLossStreak = 0;

    const doubleStreets = [
        { name: "1st DS", nums: [1,2,3,4,5,6], zone: 'low' }, 
        { name: "2nd DS", nums: [7,8,9,10,11,12], zone: 'low' },
        { name: "3rd DS", nums: [13,14,15,16,17,18], zone: 'low' }, 
        { name: "4th DS", nums: [19,20,21,22,23,24], zone: 'high' },
        { name: "5th DS", nums: [25,26,27,28,29,30], zone: 'high' }, 
        { name: "6th DS", nums: [31,32,33,34,35,36], zone: 'high' }
    ];

    function buildRouletteTable() {
        const grid = document.getElementById('rouletteGrid');
        const structure = [[3,6,9,12,15,18,21,24,27,30,33,36],[2,5,8,11,14,17,20,23,26,29,32,35],[1,4,7,10,13,16,19,22,25,28,31,34]];
        structure.forEach(rowNumbers => {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'grid-row';
            rowNumbers.forEach(num => {
                const cell = document.createElement('div');
                cell.className = `grid-cell ${reds.includes(num) ? 'r-num' : 'b-num'}`;
                cell.innerText = num;
                cell.onclick = () => addSingleSpin(num);
                rowDiv.appendChild(cell);
            });
            grid.appendChild(rowDiv);
        });
    }

    function checkLayoutHit(predictionText, outcomeNum) {
        if (!predictionText || predictionText === "--") return false;
        let names = predictionText.split(' + ');
        return names.some(name => {
            let ds = doubleStreets.find(d => d.name === name);
            return ds ? ds.nums.includes(Number(outcomeNum)) : false;
        });
    }

    // MAIN CORE MODIFICATION
    function computeDualStreetPrediction() {
        if (rawNumbers.length < 2) return { main: "--", over: "--", under: "--" };

        let lastNum = rawNumbers[rawNumbers.length - 1];
        let collectiveNeighbors = [];

        // Collect all numbers that appeared after and before the entered number in history
        for (let i = 0; i < rawNumbers.length - 1; i++) {
            if (rawNumbers[i] === lastNum) {
                if (i > 0) collectiveNeighbors.push(rawNumbers[i - 1]);
                collectiveNeighbors.push(rawNumbers[i + 1]);
            }
        }

        if (collectiveNeighbors.length === 0) return { main: "--", over: "--", under: "--" };

        // Count hits for each Double Street based on the collective neighbor pool
        let dsHits = doubleStreets.map(ds => {
            let hits = collectiveNeighbors.filter(n => ds.nums.includes(n)).length;
            return { name: ds.name, hits: hits, zone: ds.zone };
        });

        // Pick top from Low (1st, 2nd, 3rd)
        let lowDS = dsHits.filter(d => d.zone === 'low').sort((a,b) => b.hits - a.hits)[0].name;
        // Pick top from High (4th, 5th, 6th)
        let highDS = dsHits.filter(d => d.zone === 'high').sort((a,b) => b.hits - a.hits)[0].name;

        return {
            under: lowDS,
            over: highDS,
            main: `${lowDS} + ${highDS}`
        };
    }

    function processData(runSimulation = false) {
        const textStr = document.getElementById('bulkData').value.trim();
        const parsed = textStr.split(/[\s,]+/).map(Number).filter(n => !isNaN(n));
        if (parsed.length < 2) return;

        resetCounters();
        rawNumbers = [];
        trackedPredictions = [];

        for (let i = 0; i < parsed.length; i++) {
            let currentSpin = parsed[i];
            let evalStatus = "-";

            if (trackedPredictions.length > 0) {
                let lastP = trackedPredictions[trackedPredictions.length - 1];
                if (lastP.main !== "--") {
                    let hit = checkLayoutHit(lastP.main, currentSpin);
                    if (hit) { totalWins++; currentLossStreak = 0; evalStatus = "WIN"; }
                    else { totalLosses++; currentLossStreak++; evalStatus = "LOSS"; }
                    if (currentLossStreak > maxLossStreak) maxLossStreak = currentLossStreak;
                }
            }

            rawNumbers.push(currentSpin);
            let result = computeDualStreetPrediction();
            trackedPredictions.push({ ...result, eval: evalStatus });
        }
        updateUI();
        renderVisualChart();
    }

    function addSingleSpin(num) {
        let evalStatus = "-";
        if (trackedPredictions.length > 0) {
            let lastP = trackedPredictions[trackedPredictions.length - 1];
            if (lastP.main !== "--") {
                if (checkLayoutHit(lastP.main, num)) { totalWins++; currentLossStreak = 0; evalStatus = "WIN"; }
                else { totalLosses++; currentLossStreak++; evalStatus = "LOSS"; }
                if (currentLossStreak > maxLossStreak) maxLossStreak = currentLossStreak;
            }
        }
        rawNumbers.push(num);
        let result = computeDualStreetPrediction();
        trackedPredictions.push({ ...result, eval: evalStatus });
        updateUI();
        renderVisualChart();
    }

    function updateUI() {
        document.getElementById('s-cnt').innerText = rawNumbers.length;
        document.getElementById('s-win').innerText = totalWins;
        document.getElementById('s-loss').innerText = totalLosses;
        document.getElementById('s-max-loss').innerText = maxLossStreak;

        const latest = trackedPredictions[trackedPredictions.length - 1];
        if (latest) {
            document.getElementById('p-under').innerText = latest.under;
            document.getElementById('p-over').innerText = latest.over;
            document.getElementById('p-main').innerText = latest.main;
        }

        const tbody = document.getElementById('logTable');
        tbody.innerHTML = '';
        for (let i = rawNumbers.length - 1; i >= 0; i--) {
            let p = trackedPredictions[i];
            tbody.innerHTML += `<tr>
                <td>${i+1}</td>
                <td style="color:${reds.includes(rawNumbers[i])?'var(--red)':(rawNumbers[i]===0?'var(--green)':'white')}">${rawNumbers[i]}</td>
                <td>${p.under}</td>
                <td>${p.over}</td>
                <td class="${p.eval==='WIN'?'win-text':'loss-text'}">${p.eval}</td>
            </tr>`;
        }
    }

    function renderVisualChart() {
        const canvas = document.getElementById('travelChart');
        const ctx = canvas.getContext('2d');
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = 160;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (rawNumbers.length < 2) return;
        let points = rawNumbers.slice(-20);
        let xStep = canvas.width / (points.length - 1);
        ctx.strokeStyle = '#38bdf8'; ctx.lineWidth = 2; ctx.beginPath();
        points.forEach((n, i) => {
            let x = i * xStep; let y = canvas.height - (n / 36 * (canvas.height - 20)) - 10;
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.stroke();
    }

    function resetAll() {
        rawNumbers = []; trackedPredictions = []; totalWins = 0; totalLosses = 0; maxLossStreak = 0; currentLossStreak = 0;
        document.getElementById('logTable').innerHTML = '';
        updateUI();
    }

    buildRouletteTable();
</script>
</body>
</html>
