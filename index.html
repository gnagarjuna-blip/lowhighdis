<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Pattern Sequence Predictor</title>
    <style>
        :root { --bg: #0b0f19; --panel: #161e2d; --accent: #38bdf8; --green: #10b981; --red: #ef4444; --black: #111827; --text: #f1f5f9; --gold: #fbbf24; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .dashboard { max-width: 1300px; margin: 0 auto; display: grid; grid-template-columns: 1fr 380px; gap: 20px; }
        
        .setup-panel { background: var(--panel); border: 1px solid #2d3748; padding: 20px; border-radius: 12px; margin-bottom: 20px; grid-column: 1 / -1; }
        .textarea-input { width: 100%; height: 80px; background: #0b0f19; border: 1px solid #334155; border-radius: 6px; color: white; padding: 10px; font-size: 1rem; box-sizing: border-box; resize: none; }
        
        .controls { display: flex; gap: 15px; margin-top: 10px; align-items: center; }
        select { background: #0b0f19; color: white; border: 1px solid #334155; padding: 10px; border-radius: 6px; font-size: 1rem; cursor: pointer; }
        
        .hero { background: linear-gradient(145deg, #1e293b, #0f172a); border: 2px solid var(--accent); border-radius: 15px; padding: 20px; text-align: center; margin-bottom: 20px; }
        #target-main { font-size: 2.2rem; font-weight: 900; color: var(--gold); line-height: 1.2; margin: 10px 0; word-wrap: break-word; }
        
        /* Roulette Table Styling */
        .roulette-container { background: #064e3b; padding: 15px; border-radius: 12px; border: 4px solid #065f46; display: flex; margin-bottom: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); user-select: none; }
        .zero-cell { width: 50px; background: var(--green); border: 1px solid rgba(255,255,255,0.3); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; cursor: pointer; border-radius: 6px 0 0 6px; }
        .zero-cell:hover, .grid-cell:hover { filter: brightness(1.2); transform: scale(1.02); z-index: 2; }
        .grid-rows { display: flex; flex-direction: column; gap: 3px; flex-grow: 1; margin-left: 3px; }
        .grid-row { display: grid; grid-template-columns: repeat(12, 1fr); gap: 3px; }
        .grid-cell { height: 45px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; border-radius: 4px; border: 1px solid rgba(255,255,255,0.15); font-size: 1.1rem; transition: all 0.1s; }
        .r-num { background: var(--red); color: white; }
        .b-num { background: var(--black); color: white; }

        .panel { background: var(--panel); border-radius: 12px; padding: 20px; border: 1px solid #2d3748; }
        .log-area { height: 420px; overflow-y: auto; background: #0b0f19; border-radius: 8px; border: 1px solid #334155; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { background: #1e293b; padding: 12px; position: sticky; top: 0; color: var(--accent); }
        td { padding: 10px; text-align: center; border-bottom: 1px solid #2d3748; }
        
        .btn { padding: 10px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; background: var(--accent); color: #0b0f19; }
        .btn-danger { background: var(--red); color: white; }
        
        .recent-strip { display: flex; gap: 8px; justify-content: center; margin: 10px 0; font-size: 1.2rem; font-weight: bold; flex-wrap: wrap; }
        .badge { padding: 4px 10px; border-radius: 4px; background: #334155; border: 1px solid var(--accent); }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="setup-panel">
        <h2 style="margin:0 0 10px 0; font-size: 1.1rem; color: var(--accent);">1. BULK DATA ENTRY (Paste 30+ starting values here)</h2>
        <textarea id="bulkData" class="textarea-input" placeholder="Example data setup: 22 11 4 19 12 36 1 20 ..."></textarea>
        
        <div class="controls">
            <label><strong>Bet Pattern Category:</strong></label>
            <select id="betType" onchange="analyzePatterns()">
                <option value="dozen">Dozen (D1, D2, D3)</option>
                <option value="column">Column (C1, C2, C3)</option>
                <option value="doubleStreet">Double Street (DS1 - DS6)</option>
                <option value="street">Street (S1 - S12)</option>
                <option value="corner">Corner (CR1 - CR22)</option>
                <option value="split">Split (SP1 - SP60)</option>
                <option value="straight">Straight No (0 - 36)</option>
            </select>
            <button class="btn" onclick="processData()">Parse & Load Bulk Data</button>
        </div>
    </div>

    <div>
        <div class="hero">
            <div class="label" style="text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; font-size:0.8rem;">Latest 3 Results Sequence Pattern</div>
            <div id="recentPattern" class="recent-strip">-- : -- : --</div>
            <hr style="border-color: #2d3748; margin: 15px 0;">
            <div class="label" style="text-transform: uppercase; letter-spacing: 1px; color: var(--accent); font-size:0.8rem;">Historical Predicted Hits Following This Sequence</div>
            <div id="target-main">Awaiting Sequence Match...</div>
        </div>

        <h3 style="margin:0 0 10px 5px; font-size: 1rem; color:var(--text)">2. CLICK TABLE TO ENTER LATEST SPIN</h3>
        <div class="roulette-container">
            <div class="zero-cell" onclick="addSingleSpin(0)">0</div>
            <div id="rouletteGrid" class="grid-rows"></div>
        </div>
    </div>

    <div class="panel">
        <h2 style="margin:0 0 15px 0; font-size: 1rem; color:var(--accent)">SPIN STREAM LOG</h2>
        <div class="log-area">
            <table>
                <thead>
                    <tr>
                        <th>Index</th>
                        <th>Number</th>
                        <th>Pattern</th>
                    </tr>
                </thead>
                <tbody id="logTable"></tbody>
            </table>
        </div>
        <button class="btn btn-danger" style="width:100%; margin-top:15px;" onclick="resetAll()">RESET SESSION</button>
    </div>
</div>

<script>
    const reds = [1, 3, 5, 7, 9, 12, 14, 16, 18, 19, 21, 23, 25, 27, 30, 32, 34, 36];
    let rawNumbers = [];

    // Build the visual Roulette Grid layout instantly
    function buildRouletteTable() {
        const grid = document.getElementById('rouletteGrid');
        // Standard European layout split into 3 mathematical row configurations
        const structure = [
            [3, 6, 9, 12, 15, 18, 21, 24, 27, 30, 33, 36],
            [2, 5, 8, 11, 14, 17, 20, 23, 26, 29, 32, 35],
            [1, 4, 7, 10, 13, 16, 19, 22, 25, 28, 31, 34]
        ];

        structure.forEach(rowNumbers => {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'grid-row';
            rowNumbers.forEach(num => {
                const cell = document.createElement('div');
                cell.className = `grid-cell ${reds.includes(num) ? 'r-num' : 'b-num'}`;
                cell.innerText = num;
                cell.onclick = () => addSingleSpin(num);
                rowDiv.appendChild(cell);
            });
            grid.appendChild(rowDiv);
        });
    }

    // Dynamic Bet Mapping Logic Object
    function getPatternValue(num, type) {
        if (num === 0) return "Zero";
        
        switch(type) {
            case "dozen":
                return "D" + Math.ceil(num / 12);
            case "column":
                return "C" + (num % 3 === 0 ? 3 : num % 3);
            case "doubleStreet":
                return "DS" + Math.ceil(num / 6);
            case "street":
                return "S" + Math.ceil(num / 3);
            case "straight":
                return "N" + num;
            case "corner":
                // Map number to its row-based corner cluster groups
                let crIdx = 1;
                for (let box = 1; box <= 11; box++) {
                    let top = box * 3;
                    if ((num === top || num === top-1 || num === top-3 || num === top-4)) return "CR" + crIdx;
                    crIdx++;
                    if ((num === top-1 || num === top-2 || num === top-4 || num === top-5)) return "CR" + crIdx;
                    crIdx++;
                }
                return "CR-Out"; 
            case "split":
                // Vertical and horizontal layout line pairings tracking
                if (num % 3 !== 0 && num < 36) {
                    if (num % 2 === 0) return "SP" + Math.ceil(num / 2);
                }
                return "SP" + (Math.ceil(num / 3) + 15);
            default:
                return "N" + num;
        }
    }

    // Parse text areas values
    function processData() {
        const textStr = document.getElementById('bulkData').value.trim();
        if (!textStr) {
            alert("Please paste historical numbers space/comma separated.");
            return;
        }
        const parsed = textStr.split(/[\s,]+/).map(Number).filter(n => !isNaN(n) && n >= 0 && n <= 36);
        if (parsed.length < 3) {
            alert("Please provide at least 3 numbers.");
            return;
        }
        rawNumbers = parsed;
        analyzePatterns();
    }

    // Capture dynamic inputs from the UI table click events
    function addSingleSpin(num) {
        rawNumbers.push(num);
        analyzePatterns();
    }

    // Engine scanning sequence iterations
    function analyzePatterns() {
        if (rawNumbers.length < 3) return;
        
        const selectedBet = document.getElementById('betType').value;
        const patternStream = rawNumbers.map(n => getPatternValue(n, selectedBet));
        
        const totalLen = patternStream.length;
        const last3 = patternStream.slice(-3);
        
        // Display latest sequence combinations
        document.getElementById('recentPattern').innerHTML = last3.map(p => `<span class="badge">${p}</span>`).join(" ");

        let matchesFound = [];
        
        // Look up historical matches matching exactly last3 elements
        for (let i = 0; i <= totalLen - 4; i++) {
            if (
                patternStream[i] === last3[0] &&
                patternStream[i + 1] === last3[1] &&
                patternStream[i + 2] === last3[2]
            ) {
                const nextPredictionElement = patternStream[i + 3];
                const realNextNum = rawNumbers[i + 3];
                matchesFound.push(`${nextPredictionElement} <span style='color:#fff; font-size:0.95rem;'>(${realNextNum})</span>`);
            }
        }

        const outputField = document.getElementById('target-main');
        if (matchesFound.length > 0) {
            outputField.innerHTML = [...new Set(matchesFound)].join(" | ");
        } else {
            outputField.innerHTML = "<span style='font-size:1.2rem; opacity:0.5;'>No sequence match found.</span>";
        }

        updateUI(patternStream);
    }

    function updateUI(patternStream) {
        const tbody = document.getElementById('logTable');
        tbody.innerHTML = '';
        
        for (let i = rawNumbers.length - 1; i >= 0; i--) {
            const numColor = rawNumbers[i] === 0 ? 'var(--green)' : (reds.includes(rawNumbers[i]) ? 'var(--red)' : '#fff');
            tbody.innerHTML += `<tr>
                <td>${i + 1}</td>
                <td style="font-weight:bold; color: ${numColor}">${rawNumbers[i]}</td>
                <td style="color: var(--gold); font-weight:bold;">${patternStream[i]}</td>
            </tr>`;
        }
    }

    function resetAll() {
        rawNumbers = [];
        document.getElementById('bulkData').value = '';
        document.getElementById('recentPattern').innerText = "-- : -- : --";
        document.getElementById('target-main').innerText = "Awaiting Sequence Match...";
        document.getElementById('logTable').innerHTML = '';
    }

    // Run table build layout immediately on load
    buildRouletteTable();
</script>
</body>
</html>
