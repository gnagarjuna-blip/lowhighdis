<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roulette DS - Visual Unit Engine</title>
    <style>
        :root { --bg: #05070f; --panel: #0b111e; --accent: #38bdf8; --green: #10b981; --red: #ef4444; --black: #010206; --text: #f1f5f9; --gold: #fbbf24; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .dashboard { max-width: 1300px; margin: 0 auto; display: grid; grid-template-columns: 1fr 420px; gap: 20px; }
        
        .setup-panel { background: var(--panel); border: 1px solid #1e293b; padding: 15px; border-radius: 12px; grid-column: 1 / -1; display: flex; gap: 15px; align-items: center; }
        .textarea-input { flex-grow: 1; height: 50px; background: #05070f; border: 1px solid #334155; border-radius: 6px; color: white; padding: 10px; resize: none; }
        
        .progression-settings { background: #161e2e; padding: 10px 20px; border-radius: 8px; border: 1px solid var(--accent); display: flex; gap: 15px; align-items: center; }
        .unit-input { width: 60px; padding: 5px; background: #000; border: 1px solid var(--accent); color: var(--gold); font-weight: bold; text-align: center; }

        .prediction-hero { background: #0b111e; border: 2px solid var(--accent); border-radius: 15px; padding: 20px; text-align: center; margin-bottom: 20px; }
        .ds-display { display: flex; justify-content: center; gap: 20px; margin-top: 10px; }
        .ds-card { background: #05070f; padding: 10px; border-radius: 8px; border: 1px solid var(--accent); min-width: 140px; }
        .ds-value { font-size: 1.5rem; font-weight: 800; color: var(--gold); }

        /* Roulette Table with Chip Positioning */
        .roulette-container { background: #064e3b; padding: 20px; border-radius: 12px; display: flex; border: 4px solid #065f46; position: relative; margin-bottom: 20px; }
        .zero-cell { width: 60px; background: var(--green); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; cursor: pointer; border-radius: 6px 0 0 6px; z-index: 1; }
        .grid-rows { display: flex; flex-direction: column; gap: 4px; flex-grow: 1; margin-left: 4px; position: relative; }
        .grid-row { display: grid; grid-template-columns: repeat(12, 1fr); gap: 4px; }
        .grid-cell { height: 50px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1); position: relative; }
        .r-num { background: var(--red); }
        .b-num { background: var(--black); }

        /* Chip Styling */
        .chip { 
            position: absolute; width: 30px; height: 30px; background: var(--gold); border: 2px dashed #000; 
            border-radius: 50%; color: #000; font-size: 0.75rem; font-weight: 900; 
            display: none; align-items: center; justify-content: center; 
            z-index: 10; box-shadow: 0 0 10px rgba(0,0,0,0.5); transform: translate(-50%, -50%);
        }

        .log-area { height: 350px; overflow-y: auto; background: #05070f; border-radius: 8px; border: 1px solid #1e293b; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th { background: #1e293b; padding: 10px; color: var(--accent); position: sticky; top: 0; }
        td { padding: 8px; border-bottom: 1px solid #1e293b; text-align: center; }
        .btn-blue { background: var(--accent); color: #000; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; border: none; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="setup-panel">
        <div class="progression-settings">
            <label style="font-size: 0.7rem; color: var(--accent);">BASE UNIT:</label>
            <input type="number" id="baseUnit" class="unit-input" value="10">
        </div>
        <textarea id="bulkData" class="textarea-input" placeholder="History stream..."></textarea>
        <button class="btn-blue" onclick="syncHistory()">SYNC</button>
    </div>

    <div>
        <div class="prediction-hero">
            <div class="ds-display">
                <div class="ds-card">
                    <div style="font-size: 0.7rem;">LOW PREDICTIONS</div>
                    <div id="low-ds" class="ds-value">--</div>
                </div>
                <div class="ds-card">
                    <div style="font-size: 0.7rem;">HIGH PREDICTIONS</div>
                    <div id="high-ds" class="ds-value">--</div>
                </div>
            </div>
        </div>

        <div class="roulette-container" id="tableContainer">
            <div id="chip-ds1" class="chip" style="left: 10.5%; top: 100%;">0</div>
            <div id="chip-ds2" class="chip" style="left: 27.5%; top: 100%;">0</div>
            <div id="chip-ds3" class="chip" style="left: 44.5%; top: 100%;">0</div>
            <div id="chip-ds4" class="chip" style="left: 61.5%; top: 100%;">0</div>
            <div id="chip-ds5" class="chip" style="left: 78.5%; top: 100%;">0</div>
            <div id="chip-ds6" class="chip" style="left: 95.5%; top: 100%;">0</div>

            <div class="zero-cell" onclick="addNumber(0)">0</div>
            <div id="rouletteGrid" class="grid-rows"></div>
        </div>
    </div>

    <div class="panel" style="background: var(--panel); padding:15px; border-radius:12px;">
        <h3 style="margin-top:0; font-size: 0.8rem; color:var(--accent);">SESSION ANALYSIS</h3>
        <div class="log-area">
            <table>
                <thead>
                    <tr>
                        <th>Pivot</th>
                        <th>Low Play</th>
                        <th>High Play</th>
                        <th>Result</th>
                    </tr>
                </thead>
                <tbody id="logBody"></tbody>
            </table>
        </div>
        <button class="btn-red" style="width:100%; margin-top:10px; background:var(--red); color:white; border:none; padding:10px; border-radius:6px;" onclick="resetAll()">RESET</button>
    </div>
</div>

<script>
    const reds = [1, 3, 5, 7, 9, 12, 14, 16, 18, 19, 21, 23, 25, 27, 30, 32, 34, 36];
    let history = [];
    // Tracking units for all 6 DS individually
    let dsUnits = { 1: 1, 2: 1, 3: 1, 4: 1, 5: 1, 6: 1 };
    let activePredictions = { lows: [], highs: [] };

    function buildGrid() {
        const grid = document.getElementById('rouletteGrid');
        const layout = [[3, 6, 9, 12, 15, 18, 21, 24, 27, 30, 33, 36],[2, 5, 8, 11, 14, 17, 20, 23, 26, 29, 32, 35],[1, 4, 7, 10, 13, 16, 19, 22, 25, 28, 31, 34]];
        layout.forEach(row => {
            const rowDiv = document.createElement('div'); rowDiv.className = 'grid-row';
            row.forEach(n => {
                const cell = document.createElement('div');
                cell.className = `grid-cell ${reds.includes(n) ? 'r-num' : 'b-num'}`;
                cell.innerText = n; cell.onclick = () => addNumber(n);
                rowDiv.appendChild(cell);
            });
            grid.appendChild(rowDiv);
        });
    }

    function getDS(n) { return (n === 0) ? null : Math.ceil(n / 6); }

    function syncHistory() {
        const val = document.getElementById('bulkData').value.trim();
        if (!val) return;
        history = val.split(/[\s,]+/).map(Number).filter(n => !isNaN(n));
        processLogic();
    }

    function addNumber(n) {
        // Before adding the new number, evaluate the PREVIOUS prediction
        const resultDS = getDS(n);
        evaluateProgression(resultDS);

        history.push(n);
        document.getElementById('bulkData').value = history.join(' ');
        processLogic();
    }

    function evaluateProgression(hitDS) {
        if (!activePredictions.lows.length && !activePredictions.highs.length) return;

        const base = parseInt(document.getElementById('baseUnit').value);

        // Evaluate Lows
        const lowWon = activePredictions.lows.includes(hitDS?.toString());
        activePredictions.lows.forEach(dsNum => {
            if (lowWon && dsNum == hitDS) dsUnits[dsNum] = Math.max(1, dsUnits[dsNum] - 1);
            else dsUnits[dsNum] += 1; // Increase on loss
        });

        // Evaluate Highs
        const highWon = activePredictions.highs.includes(hitDS?.toString());
        activePredictions.highs.forEach(dsNum => {
            if (highWon && dsNum == hitDS) dsUnits[dsNum] = Math.max(1, dsUnits[dsNum] - 1);
            else dsUnits[dsNum] += 1; // Increase on loss
        });
    }

    function processLogic() {
        if (history.length < 2) return;
        const pivot = history[history.length - 1];
        let foundIndex = -1;

        for (let i = history.length - 2; i >= 0; i--) {
            if (history[i] === pivot) { foundIndex = i; break; }
        }

        if (foundIndex === -1) return;

        let windowNumbers = [];
        for (let j = foundIndex - 4; j <= foundIndex + 4; j++) {
            if (j >= 0 && j < history.length - 1 && j !== foundIndex) {
                windowNumbers.push(history[j]);
            }
        }

        const dsList = windowNumbers.map(n => getDS(n)).filter(d => d !== null);
        const lowList = dsList.filter(d => d <= 3);
        const highList = dsList.filter(d => d >= 4);

        activePredictions.lows = getTopTwo(lowList);
        activePredictions.highs = getTopTwo(highList);

        updateUI();
    }

    function getTopTwo(arr) {
        const counts = {};
        arr.forEach(val => counts[val] = (counts[val] || 0) + 1);
        return Object.keys(counts).sort((a, b) => counts[b] - counts[a]).slice(0, 2);
    }

    function updateUI() {
        const base = parseInt(document.getElementById('baseUnit').value);
        document.getElementById('low-ds').innerText = activePredictions.lows.length ? activePredictions.lows.join(' & ') : '--';
        document.getElementById('high-ds').innerText = activePredictions.highs.length ? activePredictions.highs.join(' & ') : '--';

        // Reset all chips
        document.querySelectorAll('.chip').forEach(c => { c.style.display = 'none'; });

        // Place new chips
        [...activePredictions.lows, ...activePredictions.highs].forEach(ds => {
            const chip = document.getElementById(`chip-ds${ds}`);
            if (chip) {
                chip.style.display = 'flex';
                chip.innerText = dsUnits[ds] * base;
            }
        });

        // Update Log
        const tbody = document.getElementById('logBody');
        const row = `<tr>
            <td>${history[history.length-1]}</td>
            <td>L(${activePredictions.lows.join(',')})</td>
            <td>H(${activePredictions.highs.join(',')})</td>
            <td style="color:var(--gold)">Next Bet: ${calculateTotalAtStake() * base}</td>
        </tr>`;
        tbody.insertAdjacentHTML('afterbegin', row);
    }

    function calculateTotalAtStake() {
        return [...activePredictions.lows, ...activePredictions.highs].reduce((sum, ds) => sum + dsUnits[ds], 0);
    }

    function resetAll() {
        history = []; dsUnits = { 1:1, 2:1, 3:1, 4:1, 5:1, 6:1 }; activePredictions = { lows:[], highs:[] };
        document.getElementById('logBody').innerHTML = '';
        updateUI();
    }

    buildGrid();
</script>
</body>
</html>
