<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roulette DS - Side-Based Progression</title>
    <style>
        :root { --bg: #05070f; --panel: #0b111e; --accent: #38bdf8; --green: #10b981; --red: #ef4444; --black: #010206; --text: #f1f5f9; --gold: #fbbf24; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .dashboard { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: 1fr 450px; gap: 20px; }
        
        .setup-panel { background: var(--panel); border: 1px solid #1e293b; padding: 15px; border-radius: 12px; grid-column: 1 / -1; display: flex; gap: 20px; align-items: center; }
        .textarea-input { flex-grow: 1; height: 50px; background: #05070f; border: 1px solid #334155; border-radius: 6px; color: white; padding: 10px; resize: none; }
        
        .progression-settings { background: #161e2e; padding: 10px 20px; border-radius: 8px; border: 1px solid var(--accent); display: flex; gap: 10px; align-items: center; }
        .unit-input { width: 70px; padding: 5px; background: #000; border: 1px solid var(--accent); color: var(--gold); font-weight: bold; text-align: center; }

        .prediction-container { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-bottom: 20px; }
        .ds-side-panel { padding: 20px; border-radius: 15px; text-align: center; border: 2px solid #1e293b; position: relative; }
        .low-zone { border-color: var(--accent); background: rgba(56, 189, 248, 0.05); }
        .high-zone { border-color: #f97316; background: rgba(249, 115, 22, 0.05); }
        .ds-value { font-size: 2.2rem; font-weight: 800; color: var(--gold); margin-top: 10px; }
        .zone-label { font-size: 0.8rem; font-weight: bold; letter-spacing: 2px; color: #94a3b8; }

        .roulette-container { background: #064e3b; padding: 25px 20px; border-radius: 12px; display: flex; border: 4px solid #065f46; position: relative; margin-bottom: 20px; }
        .zero-cell { width: 60px; background: var(--green); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; cursor: pointer; border-radius: 6px 0 0 6px; }
        .grid-rows { display: flex; flex-direction: column; gap: 4px; flex-grow: 1; margin-left: 4px; position: relative; }
        .grid-row { display: grid; grid-template-columns: repeat(12, 1fr); gap: 4px; }
        .grid-cell { height: 55px; display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .r-num { background: var(--red); }
        .b-num { background: var(--black); }

        .chip { 
            position: absolute; width: 34px; height: 34px; background: var(--gold); border: 2px dashed #000; 
            border-radius: 50%; color: #000; font-size: 0.8rem; font-weight: 900; 
            display: none; align-items: center; justify-content: center; 
            z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.6); transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .log-area { height: 400px; overflow-y: auto; background: #05070f; border-radius: 8px; border: 1px solid #1e293b; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1e293b; padding: 12px; color: var(--accent); font-size: 0.75rem; }
        td { padding: 10px; border-bottom: 1px solid #1e293b; text-align: center; font-size: 0.85rem; }
        .win-row { color: var(--green); font-weight: bold; }
        .loss-row { color: var(--red); }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="setup-panel">
        <div class="progression-settings">
            <label>UNIT SIZE:</label>
            <input type="number" id="baseUnit" class="unit-input" value="10">
        </div>
        <textarea id="bulkData" class="textarea-input" placeholder="Paste history here..."></textarea>
        <button class="btn-blue" style="background:var(--accent); border:none; padding:15px; cursor:pointer; font-weight:bold; border-radius:6px;" onclick="syncHistory()">SYNC DATA</button>
    </div>

    <div>
        <div class="prediction-container">
            <div class="ds-side-panel low-zone">
                <div class="zone-label">LOW SECTOR (DS 1-2-3)</div>
                <div id="low-ds" class="ds-value">--</div>
            </div>
            <div class="ds-side-panel high-zone">
                <div class="zone-label">HIGH SECTOR (DS 4-5-6)</div>
                <div id="high-ds" class="ds-value">--</div>
            </div>
        </div>

        <div class="roulette-container" id="tableWrapper">
            <div id="chip-ds1" class="chip" style="left: calc(60px + 4px + (100% - 64px) * 0.0833); top: 100%;">0</div>
            <div id="chip-ds2" class="chip" style="left: calc(60px + 4px + (100% - 64px) * 0.25); top: 100%;">0</div>
            <div id="chip-ds3" class="chip" style="left: calc(60px + 4px + (100% - 64px) * 0.4166); top: 100%;">0</div>
            <div id="chip-ds4" class="chip" style="left: calc(60px + 4px + (100% - 64px) * 0.5833); top: 100%;">0</div>
            <div id="chip-ds5" class="chip" style="left: calc(60px + 4px + (100% - 64px) * 0.75); top: 100%;">0</div>
            <div id="chip-ds6" class="chip" style="left: calc(60px + 4px + (100% - 64px) * 0.9166); top: 100%;">0</div>

            <div class="zero-cell" onclick="addNumber(0)">0</div>
            <div id="rouletteGrid" class="grid-rows"></div>
        </div>
    </div>

    <div class="panel" style="background: var(--panel); padding:15px; border-radius:12px; border: 1px solid #1e293b;">
        <h3 style="margin-top:0; font-size: 0.9rem; color:var(--accent);">SIDE PROGRESSION LOG</h3>
        <div class="log-area">
            <table id="sessionLog">
                <thead>
                    <tr>
                        <th>Last</th>
                        <th>Low Play</th>
                        <th>High Play</th>
                        <th>Result</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        <button onclick="resetAll()" style="width:100%; margin-top:10px; background:var(--red); color:white; border:none; padding:12px; border-radius:6px; cursor:pointer;">RESET ALL</button>
    </div>
</div>

<script>
    const reds = [1, 3, 5, 7, 9, 12, 14, 16, 18, 19, 21, 23, 25, 27, 30, 32, 34, 36];
    let history = [];
    let dsUnits = { 1: 1, 2: 1, 3: 1, 4: 1, 5: 1, 6: 1 };
    let currentPreds = { lows: [], highs: [] };

    function buildGrid() {
        const grid = document.getElementById('rouletteGrid');
        const layout = [[3, 6, 9, 12, 15, 18, 21, 24, 27, 30, 33, 36],[2, 5, 8, 11, 14, 17, 20, 23, 26, 29, 32, 35],[1, 4, 7, 10, 13, 16, 19, 22, 25, 28, 31, 34]];
        layout.forEach(row => {
            const rowDiv = document.createElement('div'); rowDiv.className = 'grid-row';
            row.forEach(n => {
                const cell = document.createElement('div');
                cell.className = `grid-cell ${reds.includes(n) ? 'r-num' : 'b-num'}`;
                cell.innerText = n; cell.onclick = () => addNumber(n);
                rowDiv.appendChild(cell);
            });
            grid.appendChild(rowDiv);
        });
    }

    function getDS(n) { return (n === 0) ? null : Math.ceil(n / 6); }

    function syncHistory() {
        const val = document.getElementById('bulkData').value.trim();
        if (!val) return;
        history = val.split(/[\s,]+/).map(Number).filter(n => !isNaN(n));
        processLogic();
    }

    function addNumber(n) {
        const hitDS = getDS(n);
        
        // Logical Rule: If win on side, BOTH predicted DS on that side decrease.
        if (currentPreds.lows.length > 0 || currentPreds.highs.length > 0) {
            const lowSideWon = currentPreds.lows.includes(hitDS?.toString());
            const highSideWon = currentPreds.highs.includes(hitDS?.toString());

            // Handle Low Side Progression
            currentPreds.lows.forEach(ds => {
                if (lowSideWon) dsUnits[ds] = Math.max(1, dsUnits[ds] - 1);
                else dsUnits[ds] += 1;
            });

            // Handle High Side Progression
            currentPreds.highs.forEach(ds => {
                if (highSideWon) dsUnits[ds] = Math.max(1, dsUnits[ds] - 1);
                else dsUnits[ds] += 1;
            });
        }

        history.push(n);
        document.getElementById('bulkData').value = history.join(' ');
        processLogic();
    }

    function processLogic() {
        if (history.length < 2) return;
        const pivot = history[history.length - 1];
        let foundIndex = -1;

        for (let i = history.length - 2; i >= 0; i--) {
            if (history[i] === pivot) { foundIndex = i; break; }
        }

        if (foundIndex === -1) return;

        let window = [];
        for (let j = foundIndex - 4; j <= foundIndex + 4; j++) {
            if (j >= 0 && j < history.length - 1 && j !== foundIndex) window.push(history[j]);
        }

        const dss = window.map(n => getDS(n)).filter(d => d !== null);
        currentPreds.lows = getTop(dss.filter(d => d <= 3));
        currentPreds.highs = getTop(dss.filter(d => d >= 4));

        updateUI();
    }

    function getTop(arr) {
        const counts = {};
        arr.forEach(v => counts[v] = (counts[v] || 0) + 1);
        return Object.keys(counts).sort((a, b) => counts[b] - counts[a]).slice(0, 2);
    }

    function updateUI() {
        const base = parseInt(document.getElementById('baseUnit').value);
        document.getElementById('low-ds').innerText = currentPreds.lows.length ? currentPreds.lows.join(' & ') : '--';
        document.getElementById('high-ds').innerText = currentPreds.highs.length ? currentPreds.highs.join(' & ') : '--';

        document.querySelectorAll('.chip').forEach(c => c.style.display = 'none');

        [...currentPreds.lows, ...currentPreds.highs].forEach(ds => {
            const chip = document.getElementById(`chip-ds${ds}`);
            if (chip) {
                chip.style.display = 'flex';
                chip.innerText = dsUnits[ds] * base;
            }
        });

        const log = document.querySelector('#sessionLog tbody');
        const lastNum = history[history.length - 1];
        const hitDS = getDS(lastNum);
        const isWin = currentPreds.lows.includes(hitDS?.toString()) || currentPreds.highs.includes(hitDS?.toString());

        log.insertAdjacentHTML('afterbegin', `
            <tr class="${isWin ? 'win-row' : 'loss-row'}">
                <td>${lastNum}</td>
                <td>${currentPreds.lows.join(',') || '-'}</td>
                <td>${currentPreds.highs.join(',') || '-'}</td>
                <td>${isWin ? 'WIN' : 'LOSS'}</td>
            </tr>
        `);
    }

    function resetAll() {
        history = []; dsUnits = {1:1, 2:1, 3:1, 4:1, 5:1, 6:1}; currentPreds = {lows:[], highs:[]};
        document.querySelector('#sessionLog tbody').innerHTML = '';
        updateUI();
    }

    buildGrid();
</script>
</body>
</html>
