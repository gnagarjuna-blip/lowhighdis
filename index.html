<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Color-Range Tracker</title>
    <style>
        :root { --bg: #0b0f19; --panel: #161e2d; --accent: #38bdf8; --green: #10b981; --red: #ef4444; --black: #1e293b; --text: #f1f5f9; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .dashboard { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 380px; gap: 20px; }
        
        .table-section { background: #064e3b; padding: 20px; border-radius: 15px; border: 4px solid #065f46; overflow-x: auto; }
        .roulette-board { display: flex; align-items: stretch; min-width: 800px; }
        .zero-container { width: 70px; background: var(--green); border: 2px solid white; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: bold; cursor: pointer; border-radius: 10px 0 0 10px; margin-right: 5px; }
        .numbers-grid { display: grid; grid-template-columns: repeat(12, 1fr); grid-template-rows: repeat(3, 1fr); gap: 3px; flex-grow: 1; }
        .cell { height: 60px; border: 1px solid rgba(255,255,255,0.3); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.1s; border-radius: 4px; }
        .r { background: var(--red); } .b { background: var(--black); }
        
        .panel { background: var(--panel); border-radius: 12px; padding: 20px; border: 1px solid #2d3748; }
        .prediction-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .pred-box { background: #0f172a; border: 1px solid #334155; padding: 15px; border-radius: 10px; text-align: center; }
        .pred-box.active { border-color: var(--accent); box-shadow: 0 0 15px rgba(56, 189, 248, 0.2); }
        .target-val { font-size: 2rem; font-weight: 800; color: #fbbf24; display: block; }
        .pred-label { font-size: 0.65rem; text-transform: uppercase; opacity: 0.6; }

        .log-wrap { height: 300px; overflow-y: auto; margin-top: 15px; border-radius: 8px; background: #0b0f19; border: 1px solid #2d3748; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { background: #1e293b; padding: 10px; position: sticky; top: 0; }
        td { padding: 8px; text-align: center; border-bottom: 1px solid #2d3748; }

        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-primary { background: var(--accent); color: #0b0f19; }
        .btn-danger { background: #7f1d1d; color: white; margin-top: 20px; }
        .bulk-area { width: 100%; height: 60px; background: #0b0f19; color: var(--accent); border: 1px solid #475569; border-radius: 6px; padding: 10px; box-sizing: border-box; }
        
        .stat-line { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #2d3748; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="dashboard">
    <div>
        <div class="table-section">
            <h2 style="margin:0 0 15px 0; font-size: 1rem;">INPUT RESULT</h2>
            <div class="roulette-board">
                <div class="zero-container" onclick="track(0)">0</div>
                <div id="boardGrid" class="numbers-grid"></div>
            </div>
        </div>

        <div class="panel" style="margin-top: 20px;">
            <h2 style="margin:0; font-size: 1rem;">SESSION DATA LOG</h2>
            <div class="log-wrap">
                <table>
                    <thead>
                        <tr><th>Spin</th><th>Result</th><th>Type</th><th>Dist</th></tr>
                    </thead>
                    <tbody id="logTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div>
        <div class="prediction-grid">
            <div id="box-RL" class="pred-box"><span class="pred-label">RED LOW</span><span id="pred-RL" class="target-val">--</span></div>
            <div id="box-BL" class="pred-box"><span class="pred-label">BLACK LOW</span><span id="pred-BL" class="target-val">--</span></div>
            <div id="box-RH" class="pred-box"><span class="pred-label">RED HIGH</span><span id="pred-RH" class="target-val">--</span></div>
            <div id="box-BH" class="pred-box"><span class="pred-label">BLACK HIGH</span><span id="pred-BH" class="target-val">--</span></div>
        </div>

        <div class="panel">
            <h2 style="margin:0 0 10px 0; font-size: 1rem;">CATEGORY AVERAGES</h2>
            <div id="stats-container">
                <div class="stat-line"><span>Red Low Avg:</span><span id="avg-RL">0.0</span></div>
                <div class="stat-line"><span>Black Low Avg:</span><span id="avg-BL">0.0</span></div>
                <div class="stat-line"><span>Red High Avg:</span><span id="avg-RH">0.0</span></div>
                <div class="stat-line"><span>Black High Avg:</span><span id="avg-BH">0.0</span></div>
            </div>
            
            <div style="margin-top:20px;">
                <textarea id="bulkData" class="bulk-area" placeholder="Paste data (23, 4, 25, 14, 12, 33...)"></textarea>
                <button class="btn btn-primary" onclick="importHistory()">PROCESS HISTORY</button>
            </div>
            <button class="btn btn-danger" onclick="resetSession()">CLEAR ALL DATA</button>
        </div>
    </div>
</div>

<script>
    const wheelOrder = [0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26];
    const reds = [1, 3, 5, 7, 9, 12, 14, 16, 18, 19, 21, 23, 25, 27, 30, 32, 34, 36];
    
    let history = []; 

    function getCategory(n) {
        if (n === 0) return "ZERO";
        const color = reds.includes(n) ? "R" : "B";
        const range = (n <= 18) ? "L" : "H";
        return color + range; // e.g., RL, BH, BL, RH
    }

    function buildBoard() {
        const grid = document.getElementById('boardGrid');
        const rows = [[3,6,9,12,15,18,21,24,27,30,33,36],[2,5,8,11,14,17,20,23,26,29,32,35],[1,4,7,10,13,16,19,22,25,28,31,34]];
        rows.forEach(rowArr => {
            rowArr.forEach(n => {
                const cell = document.createElement('div');
                cell.className = `cell ${reds.includes(n) ? 'r' : 'b'}`;
                cell.innerText = n;
                cell.onclick = () => track(n);
                grid.appendChild(cell);
            });
        });
    }

    function track(num) {
        let dist = null;
        if (history.length > 0) {
            const lastNum = history[history.length - 1].num;
            dist = (wheelOrder.indexOf(num) - wheelOrder.indexOf(lastNum) + 37) % 37;
        }
        history.push({ num, type: getCategory(num), dist });
        process();
    }

    function process() {
        const categories = ["RL", "BL", "RH", "BH"];
        const latest = history[history.length - 1];
        const lastIdx = wheelOrder.indexOf(latest.num);

        // Highlight the current active category box
        categories.forEach(cat => document.getElementById(`box-${cat}`).classList.remove('active'));
        if (latest.type !== "ZERO") document.getElementById(`box-${latest.type}`).classList.add('active');

        categories.forEach(cat => {
            // Get all distances that happened WHEN this category appeared
            const catDists = history.filter(h => h.type === cat && h.dist !== null).map(h => h.dist);
            const avg = catDists.length ? (catDists.reduce((a,b) => a+b, 0) / catDists.length) : 0;
            
            document.getElementById(`avg-${cat}`).innerText = avg.toFixed(1);
            
            if (catDists.length > 0) {
                const predIdx = (lastIdx + Math.round(avg)) % 37;
                document.getElementById(`pred-${cat}`).innerText = wheelOrder[predIdx];
            } else {
                document.getElementById(`pred-${cat}`).innerText = "--";
            }
        });

        updateUI();
    }

    function updateUI() {
        const tbody = document.getElementById('logTable');
        tbody.innerHTML = '';
        [...history].reverse().forEach((entry, i) => {
            tbody.innerHTML += `<tr>
                <td>${history.length - i}</td>
                <td style="color:${reds.includes(entry.num)?'#ef4444':'#94a3b8'}"><b>${entry.num}</b></td>
                <td>${entry.type}</td>
                <td>${entry.dist !== null ? entry.dist : '-'}</td>
            </tr>`;
        });
    }

    function importHistory() {
        const raw = document.getElementById('bulkData').value;
        const nums = raw.split(/[\s,]+/).map(Number).filter(n => !isNaN(n) && n >= 0 && n <= 36);
        nums.forEach(n => track(n));
        document.getElementById('bulkData').value = '';
    }

    function resetSession() {
        history = [];
        process();
        document.getElementById('logTable').innerHTML = '';
    }

    buildBoard();
</script>
</body>
</html>
