<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Sequence Predictor</title>
    <style>
        :root { --bg: #0b0f19; --panel: #161e2d; --accent: #38bdf8; --green: #10b981; --red: #ef4444; --black: #1e293b; --text: #f1f5f9; --gold: #fbbf24; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .dashboard { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 400px; gap: 20px; }
        
        .setup-panel { background: var(--panel); border: 1px solid #2d3748; padding: 20px; border-radius: 12px; margin-bottom: 20px; grid-column: 1 / -1; }
        .textarea-input { width: 100%; height: 80px; background: #0b0f19; border: 1px solid #334155; border-radius: 6px; color: white; padding: 10px; font-size: 1rem; box-sizing: border-box; resize: none; }
        
        .controls { display: flex; gap: 15px; margin-top: 10px; align-items: center; }
        select, input[type="number"] { background: #0b0f19; color: white; border: 1px solid #334155; padding: 10px; border-radius: 6px; font-size: 1rem; }
        
        .hero { background: linear-gradient(145deg, #1e293b, #0f172a); border: 2px solid var(--accent); border-radius: 15px; padding: 20px; text-align: center; margin-bottom: 20px; }
        #target-main { font-size: 2.5rem; font-weight: 900; color: var(--gold); line-height: 1.2; margin: 10px 0; }
        
        .panel { background: var(--panel); border-radius: 12px; padding: 20px; border: 1px solid #2d3748; }
        .log-area { height: 400px; overflow-y: auto; background: #0b0f19; border-radius: 8px; border: 1px solid #334155; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { background: #1e293b; padding: 12px; position: sticky; top: 0; color: var(--accent); }
        td { padding: 10px; text-align: center; border-bottom: 1px solid #2d3748; }
        
        .btn { padding: 10px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; background: var(--accent); color: #0b0f19; }
        .btn:hover { opacity: 0.9; }
        .btn-danger { background: var(--red); color: white; }
        
        .recent-strip { display: flex; gap: 8px; justify-content: center; margin: 10px 0; font-size: 1.2rem; font-weight: bold; }
        .badge { padding: 4px 10px; border-radius: 4px; background: #334155; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="setup-panel">
        <h2 style="margin:0 0 10px 0; font-size: 1.2rem; color: var(--accent);">1. BULK DATA ENTRY (Enter 30+ numbers to start)</h2>
        <textarea id="bulkData" class="textarea-input" placeholder="Example: 22 11 4 19 12 36 1 20 ..."></textarea>
        
        <div class="controls">
            <label><strong>Bet Type:</strong></label>
            <select id="betType" onchange="processData()">
                <option value="dozen">Dozen (D1, D2, D3)</option>
                <option value="column">Column (C1, C2, C3)</option>
                <option value="doubleStreet">Double Street (DS1 - DS6)</option>
            </select>
            <button class="btn" onclick="processData()">Parse & Initialize Data</button>
        </div>
    </div>

    <div>
        <div class="hero">
            <div class="label" style="text-transform: uppercase; letter-spacing: 1px; opacity: 0.7;">Latest 3 Results Pattern Sequence</div>
            <div id="recentPattern" class="recent-strip">-- : -- : --</div>
            <hr style="border-color: #2d3748; margin: 15px 0;">
            <div class="label" style="text-transform: uppercase; letter-spacing: 1px; color: var(--accent);">Historical Predicted Matches Found After This Sequence</div>
            <div id="target-main">Awaiting Sequence Match...</div>
        </div>

        <div class="panel" style="margin-bottom: 20px;">
            <h2 style="margin:0 0 10px 0; font-size: 1rem; color:var(--accent)">2. ADD NEW SPIN ONE-BY-ONE</h2>
            <div style="display: flex; gap: 10px;">
                <input type="number" id="singleNum" min="0" max="36" placeholder="e.g. 25" style="flex-grow: 1;">
                <button class="btn" onclick="addSingleSpin()">Add Spin</button>
            </div>
        </div>
    </div>

    <div class="panel">
        <h2 style="margin:0 0 15px 0; font-size: 1rem; color:var(--accent)">SPIN DATA STREAM</h2>
        <div class="log-area">
            <table>
                <thead>
                    <tr>
                        <th>Index</th>
                        <th>Number</th>
                        <th>Pattern Value</th>
                    </tr>
                </thead>
                <tbody id="logTable"></tbody>
            </table>
        </div>
        <button class="btn btn-danger" style="width:100%; margin-top:15px;" onclick="resetAll()">RESET SESSION</button>
    </div>
</div>

<script>
    let rawNumbers = []; // Main array storing ordered integers

    // Mapping Functions for Roulette properties
    function getPatternValue(num, type) {
        if (num === 0) return "Zero";
        
        if (type === "dozen") {
            if (num <= 12) return "D1";
            if (num <= 24) return "D2";
            return "D3";
        }
        
        if (type === "column") {
            if (num % 3 === 1) return "C1";
            if (num % 3 === 2) return "C2";
            return "C3";
        }
        
        if (type === "doubleStreet") {
            if (num <= 6) return "DS1";
            if (num <= 12) return "DS2";
            if (num <= 18) return "DS3";
            if (num <= 24) return "DS4";
            if (num <= 30) return "DS5";
            return "DS6";
        }
    }

    // Process textarea bulk input data
    function processData() {
        const textStr = document.getElementById('bulkData').value.trim();
        if (!textStr) {
            alert("Please paste historical data numbers first.");
            return;
        }

        // Clean up text format split via spaces or commas
        const parsed = textStr.split(/[\s,]+/).map(Number).filter(n => !isNaN(n) && n >= 0 && n <= 36);
        
        if (parsed.length < 3) {
            alert("Please input at least 3 numbers to formulate pattern combinations.");
            return;
        }

        rawNumbers = parsed;
        analyzePatterns();
    }

    // Add a manual one-by-one spin
    function addSingleSpin() {
        const inputEl = document.getElementById('singleNum');
        const val = parseInt(inputEl.value, 10);
        
        if (isNaN(val) || val < 0 || val > 36) {
            alert("Please enter a valid roulette number (0-36).");
            return;
        }
        
        rawNumbers.push(val);
        inputEl.value = '';
        analyzePatterns();
    }

    // Main structural mathematical engine
    function analyzePatterns() {
        const selectedBet = document.getElementById('betType').value;
        
        // 1. Convert all historical numeric hits into selected pattern codes
        const patternStream = rawNumbers.map(n => getPatternValue(n, selectedBet));

        // 2. Extract latest 3 processed tags
        const totalLen = patternStream.length;
        const last3 = patternStream.slice(-3);
        
        // Update live status header display
        document.getElementById('recentPattern').innerHTML = last3.map(p => `<span class="badge">${p}</span>`).join(" ");

        // 3. Scan structural past dataset looking for identical sequences
        let matchesFound = [];
        
        // Look through indices up to length - 3 so we have an element available ahead
        for (let i = 0; i <= totalLen - 4; i++) {
            if (
                patternStream[i] === last3[0] &&
                patternStream[i + 1] === last3[1] &&
                patternStream[i + 2] === last3[2]
            ) {
                // Fetch Next Predicted element coming right after the set match
                const nextPredictionElement = patternStream[i + 3];
                const realNextNum = rawNumbers[i + 3];
                matchesFound.push(`${nextPredictionElement} (${realNextNum})`);
            }
        }

        // 4. Print predictions out to dashboard UI
        const outputField = document.getElementById('target-main');
        if (matchesFound.length > 0) {
            outputField.innerHTML = [...new Set(matchesFound)].join(" | ");
        } else {
            outputField.innerHTML = "No matching pattern found in history.";
        }

        // Update overall data grid interface
        updateUI(patternStream);
    }

    // Update historical UI viewports
    function updateUI(patternStream) {
        const tbody = document.getElementById('logTable');
        tbody.innerHTML = '';
        
        // Create matching reversed historical tables
        for (let i = rawNumbers.length - 1; i >= 0; i--) {
            tbody.innerHTML += `<tr>
                <td>${i + 1}</td>
                <td style="font-weight:bold; color: #fff">${rawNumbers[i]}</td>
                <td style="color: var(--gold); font-weight:bold;">${patternStream[i]}</td>
            </tr>`;
        }
    }

    // Clear tracking cache memory completely
    function resetAll() {
        rawNumbers = [];
        document.getElementById('bulkData').value = '';
        document.getElementById('singleNum').value = '';
        document.getElementById('recentPattern').innerText = "-- : -- : --";
        document.getElementById('target-main').innerText = "Awaiting Sequence Match...";
        document.getElementById('logTable').innerHTML = '';
    }
</script>
</body>
</html>
