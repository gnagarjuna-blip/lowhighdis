<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sided Double Street Roulette Tracker</title>
    <style>
        body {
            background-color: #064e26;
            color: white;
            font-family: Arial, sans-serif;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 10px;
        }
        h2 { text-align: center; color: #fff; text-transform: uppercase; margin-top: 0; }
        
        .dash {
            display: flex;
            justify-content: center;
            gap: 30px;
            background: #032b14;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 25px;
            border: 1px solid #096131;
        }
        .dash-field { display: flex; flex-direction: column; align-items: center; }
        .dash-field label { font-size: 11px; text-transform: uppercase; color: #81c784; margin-bottom: 5px; font-weight: bold; }
        .dash-field input { background: #111; border: 1px solid #0b6635; color: #00ff66; padding: 6px; font-size: 16px; width: 120px; text-align: center; font-weight: bold; border-radius: 4px; }

        /* Board Container Wrapper */
        .board-container {
            position: relative;
            margin: 30px auto;
            width: 849px; 
            height: 169px;
            padding: 0;
        }
        .roulette-board {
            display: flex;
            width: 100%;
            height: 100%;
        }
        .zero-box {
            width: 65px;
            height: 165px;
            border: 2px solid #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            background: #008000;
            cursor: pointer;
            box-sizing: border-box;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(12, 65px);
            grid-template-rows: repeat(3, 55px);
            width: 784px;
            height: 165px;
            box-sizing: border-box;
        }
        .cell {
            border: 2px solid #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            box-sizing: border-box;
        }
        .cell:hover { background-color: #ffd700 !important; color: black; }
        .red { background-color: #d32f2f; }
        .black { background-color: #1a1a1a; }

        /* Chips placed precisely on the lower intersection lines */
        .chip {
            position: absolute;
            width: 36px;
            height: 36px;
            border: 2px dashed #fff;
            border-radius: 50%;
            color: white;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 99;
            box-shadow: 0 4px 8px rgba(0,0,0,0.7);
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        /* Zero Box = 65px. Columns = 65px.
           DS 7-12 (Intersection line after column 3, under number 7): 65 + (3 * 65) = 260px
           DS 10-15 (Intersection line after column 4, under number 10): 65 + (4 * 65) = 325px
           DS 22-27 (Intersection line after column 8, under number 22): 65 + (8 * 65) = 585px
           DS 25-30 (Intersection line after column 9, under number 25): 65 + (9 * 65) = 650px
        */
        #chip-ds-7-12   { left: 260px; top: 165px; background: #2e7d32; } 
        #chip-ds-10-15  { left: 325px; top: 165px; background: #1565c0; } 
        #chip-ds-22-27  { left: 585px; top: 165px; background: #e65100; } 
        #chip-ds-25-30  { left: 650px; top: 165px; background: #283593; } 

        /* Panels layout */
        .status-panel {
            background: #032b14;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #096131;
            margin-bottom: 20px;
        }
        .status-panel h3 { margin: 0 0 15px 0; text-align: center; font-size: 14px; color: #81c784; letter-spacing: 1px;}
        .panel-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .data-card { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 4px; text-align: center; border: 1px solid #096131; }
        .data-card div:first-child { font-size: 11px; color: #81c784; font-weight: bold; margin-bottom: 5px; }
        .data-val { font-size: 22px; font-weight: bold; color: #00ff66; }

        .log-panel {
            background: #000;
            padding: 12px;
            border-radius: 6px;
            height: 150px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 13px;
            color: #aaa;
            border: 1px solid #222;
        }
        .log-entry { padding: 4px 0; border-bottom: 1px dashed #111; }
        .txt-win { color: #00ff66; font-weight: bold; }
        .txt-loss { color: #ff5252; }
    </style>
</head>
<body>

<div class="container">
    <h2>Sided Double Street Roulette Tracker</h2>
    <div style="text-align:center; font-size:13px; color:#ffd700; margin-bottom:15px; font-weight:bold;">👉 Click any number directly on the board layout to log a live spin!</div>

    <div class="dash">
        <div class="dash-field">
            <label>Current Bankroll ($)</label>
            <input type="number" id="balanceInput" value="1000">
        </div>
        <div class="dash-field">
            <label>Base Unit ($)</label>
            <input type="number" id="baseSizeInput" value="10" onchange="syncBase()">
        </div>
    </div>

    <div class="board-container">
        <div class="chip" id="chip-ds-7-12">10</div>
        <div class="chip" id="chip-ds-10-15">10</div>
        <div class="chip" id="chip-ds-22-27">10</div>
        <div class="chip" id="chip-ds-25-30">10</div>

        <div class="roulette-board">
            <div class="zero-box" onclick="processSpin(0)">0</div>
            <div class="grid-container" id="boardGrid"></div>
        </div>
    </div>

    <div class="status-panel">
        <h3>CURRENT LIVE STREET WAGERS (SIDED PROGRESSION)</h3>
        <div class="panel-grid">
            <div class="data-card">
                <div>DS 7-12 Bet</div>
                <div class="data-val" id="lbl-ds-7-12">10</div>
            </div>
            <div class="data-card">
                <div>DS 10-15 Bet</div>
                <div class="data-val" id="lbl-ds-10-15">10</div>
            </div>
            <div class="data-card">
                <div>DS 22-27 Bet</div>
                <div class="data-val" id="lbl-ds-22-27">10</div>
            </div>
            <div class="data-card">
                <div>DS 25-30 Bet</div>
                <div class="data-val" id="lbl-ds-25-30">10</div>
            </div>
        </div>
    </div>

    <div class="log-panel" id="logSystem">System initialized. Click numbers above to run sided progression...</div>
</div>

<script>
    const boardLayout = [
        [3, 6, 9, 12, 15, 18, 21, 24, 27, 30, 33, 36],
        [2, 5, 8, 11, 14, 17, 20, 23, 26, 29, 32, 35],
        [1, 4, 7, 10, 13, 16, 19, 22, 25, 28, 31, 34]
    ];
    const redNums = [1, 3, 5, 7, 9, 12, 14, 16, 18, 19, 21, 23, 25, 27, 30, 32, 34, 36];

    // Sided range zones
    const lowSideZone  = [7, 8, 9, 10, 11, 12, 13, 14, 15];
    const highSideZone = [22, 23, 24, 25, 26, 27, 28, 29, 30];

    // Central overlap triggers
    const centralLow  = [10, 11, 12];
    const centralHigh = [25, 26, 27];

    // Individual street groups for payout tracking
    const ds7_12  = [7, 8, 9, 10, 11, 12];
    const ds10_15 = [10, 11, 12, 13, 14, 15];
    const ds22_27 = [22, 23, 24, 25, 26, 27];
    const ds25_30 = [25, 26, 27, 28, 29, 30];

    let baseUnit = 10;
    let b7_12 = 10, b10_15 = 10, b22_27 = 10, b25_30 = 10;

    function buildBoard() {
        const grid = document.getElementById('boardGrid');
        grid.innerHTML = '';
        for (let r = 0; r < 3; r++) {
            for (let c = 0; c < 12; c++) {
                const num = boardLayout[r][c];
                const color = redNums.includes(num) ? 'red' : 'black';
                const cell = document.createElement('div');
                cell.className = `cell ${color}`;
                cell.innerText = num;
                cell.onclick = () => processSpin(num);
                grid.appendChild(cell);
            }
        }
    }

    function syncBase() {
        baseUnit = parseInt(document.getElementById('baseSizeInput').value) || 10;
        b7_12 = baseUnit; b10_15 = baseUnit; b22_27 = baseUnit; b25_30 = baseUnit;
        refreshUI();
    }

    function refreshUI() {
        document.getElementById('chip-ds-7-12').innerText = b7_12;
        document.getElementById('chip-ds-10-15').innerText = b10_15;
        document.getElementById('chip-ds-22-27').innerText = b22_27;
        document.getElementById('chip-ds-25-30').innerText = b25_30;

        document.getElementById('lbl-ds-7-12').innerText = b7_12;
        document.getElementById('lbl-ds-10-15').innerText = b10_15;
        document.getElementById('lbl-ds-22-27').innerText = b22_27;
        document.getElementById('lbl-ds-25-30').innerText = b25_30;
    }

    function processSpin(num) {
        let currentBankroll = parseFloat(document.getElementById('balanceInput').value) || 0;
        
        let roundCost = b7_12 + b10_15 + b22_27 + b25_30;
        currentBankroll -= roundCost;

        let totalPayout = 0;

        // Payout Checks (Standard 5 to 1 payout, returns 6x bet)
        if (ds7_12.includes(num))  totalPayout += (b7_12 * 6);
        if (ds10_15.includes(num)) totalPayout += (b10_15 * 6);
        if (ds22_27.includes(num)) totalPayout += (b22_27 * 6);
        if (ds25_30.includes(num)) totalPayout += (b25_30 * 6);

        currentBankroll += totalPayout;
        document.getElementById('balanceInput').value = currentBankroll;

        // --- SIDED PROGRESSION ENGINE ---
        
        // 1. Evaluate Low Side (7 to 15)
        if (lowSideZone.includes(num)) {
            let dropAmount = centralLow.includes(num) ? (4 * baseUnit) : (2 * baseUnit);
            b7_12  = Math.max(baseUnit, b7_12 - dropAmount);
            b10_15 = Math.max(baseUnit, b10_15 - dropAmount);
        } else {
            b7_12  += baseUnit;
            b10_15 += baseUnit;
        }

        // 2. Evaluate High Side (22 to 30)
        if (highSideZone.includes(num)) {
            let dropAmount = centralHigh.includes(num) ? (4 * baseUnit) : (2 * baseUnit);
            b22_27 = Math.max(baseUnit, b22_27 - dropAmount);
            b25_30 = Math.max(baseUnit, b25_30 - dropAmount);
        } else {
            b22_27 += baseUnit;
            b25_30 += baseUnit;
        }

        refreshUI();

        let netProfit = totalPayout - roundCost;
        let outcomeMsg = netProfit >= 0 ? `<span class="txt-win">WIN (+$${netProfit})</span>` : `<span class="txt-loss">LOSS (-$${Math.abs(netProfit)})</span>`;
        let logMsg = `Spin: <b>${num}</b> -> ${outcomeMsg} | Stakes: [7-12: ${b7_12}] [10-15: ${b10_15}] | [22-27: ${b22_27}] [25-30: ${b25_30}]`;

        const logger = document.getElementById('logSystem');
        if (logger.innerHTML.includes("System initialized")) logger.innerHTML = "";
        logger.innerHTML = `<div class="log-entry">${logMsg}</div>` + logger.innerHTML;
    }

    window.onload = () => {
        buildBoard();
        refreshUI();
    };
</script>

</body>
</html>
