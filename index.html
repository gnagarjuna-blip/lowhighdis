<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Split-Range Dealer Signature Tracker</title>
    <style>
        :root { --bg: #0b0f19; --panel: #161e2d; --accent: #38bdf8; --green: #10b981; --red: #ef4444; --black: #1e293b; --text: #f1f5f9; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .dashboard { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 350px; gap: 20px; }
        
        .table-section { background: #064e3b; padding: 20px; border-radius: 15px; border: 4px solid #065f46; position: relative; overflow-x: auto; }
        .roulette-board { display: flex; align-items: stretch; min-width: 800px; }
        
        .zero-container { width: 70px; background: var(--green); border: 2px solid white; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: bold; cursor: pointer; border-top-left-radius: 40px; border-bottom-left-radius: 40px; margin-right: 5px; }
        
        .numbers-grid { display: grid; grid-template-columns: repeat(12, 1fr); grid-template-rows: repeat(3, 1fr); gap: 3px; flex-grow: 1; }
        .cell { height: 60px; border: 1px solid rgba(255,255,255,0.3); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.1s; border-radius: 2px; }
        .cell:hover { filter: brightness(1.3); border-color: white; }
        .cell:active { transform: scale(0.95); }
        .r { background: var(--red); }
        .b { background: var(--black); }

        .panel { background: var(--panel); border-radius: 12px; padding: 20px; border: 1px solid #2d3748; }
        .prediction-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .prediction-hero { text-align: center; background: #0f172a; border: 2px solid var(--accent); padding: 15px; border-radius: 12px; }
        .pred-label { font-size: 0.7rem; letter-spacing: 1px; opacity: 0.6; margin-bottom: 5px; }
        .target-val { font-size: 2.5rem; font-weight: 800; color: #fbbf24; }
        
        .log-wrap { height: 350px; overflow-y: auto; margin-top: 15px; border-radius: 8px; background: #0b0f19; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { background: #1e293b; padding: 12px; position: sticky; top: 0; text-align: center; }
        td { padding: 8px; text-align: center; border-bottom: 1px solid #2d3748; }

        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-primary { background: var(--accent); color: #0b0f19; }
        .btn-danger { background: #7f1d1d; color: white; }
        
        .bulk-area { width: 100%; height: 60px; background: #0b0f19; color: var(--accent); border: 1px solid #475569; border-radius: 6px; padding: 10px; box-sizing: border-box; margin-top: 10px; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.85rem; }
        .low-color { color: #f472b6; } /* Pink for Low */
        .high-color { color: #60a5fa; } /* Blue for High */
    </style>
</head>
<body>

<div class="dashboard">
    <div>
        <div class="table-section">
            <h2 style="margin:0 0 15px 0; font-size: 1rem; opacity: 0.8;">LIVE ROULETTE INPUT</h2>
            <div class="roulette-board">
                <div class="zero-container" onclick="track(0)">0</div>
                <div class="numbers-grid" id="boardGrid"></div>
            </div>
        </div>

        <div class="panel" style="margin-top: 20px;">
            <h2 style="margin:0; font-size: 1rem;">SESSION LOG (SPLIT ANALYTICS)</h2>
            <div class="log-wrap">
                <table>
                    <thead>
                        <tr><th>Spin</th><th>Result</th><th>Range</th><th>Wheel Dist</th></tr>
                    </thead>
                    <tbody id="logTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div>
        <div class="prediction-container">
            <div class="prediction-hero">
                <div class="pred-label">LOW (1-18)</div>
                <div id="target-low" class="target-val">--</div>
            </div>
            <div class="prediction-hero">
                <div class="pred-label">HIGH (19-36)</div>
                <div id="target-high" class="target-val">--</div>
            </div>
        </div>

        <div class="panel">
            <h2 style="margin:0; font-size: 1rem;">RANGE AVERAGES</h2>
            <div style="margin: 15px 0;">
                <div class="info-row">
                    <span>Low (1-18) Avg Dist:</span>
                    <span id="avg-low" class="low-color" style="font-weight:bold;">0.0</span>
                </div>
                <div class="info-row">
                    <span>High (19-36) Avg Dist:</span>
                    <span id="avg-high" class="high-color" style="font-weight:bold;">0.0</span>
                </div>
                <div class="info-row">
                    <span style="opacity:0.7">Last Hit:</span>
                    <span id="last-hit-display">None</span>
                </div>
            </div>
            
            <textarea id="bulkData" class="bulk-area" placeholder="Paste history (e.g. 1, 19, 5, 30)"></textarea>
            <button class="btn btn-primary" onclick="importHistory()">IMPORT DATA</button>
            <button class="btn btn-danger" onclick="resetSession()">RESET ALL</button>
        </div>
    </div>
</div>

<script>
    const wheelOrder = [0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26];
    const reds = [1, 3, 5, 7, 9, 12, 14, 16, 18, 19, 21, 23, 25, 27, 30, 32, 34, 36];
    
    let history = []; // Stores {num, range, dist}

    function buildBoard() {
        const grid = document.getElementById('boardGrid');
        const rows = [[3,6,9,12,15,18,21,24,27,30,33,36],[2,5,8,11,14,17,20,23,26,29,32,35],[1,4,7,10,13,16,19,22,25,28,31,34]];
        rows.forEach(rowArr => {
            rowArr.forEach(n => {
                const cell = document.createElement('div');
                cell.className = `cell ${reds.includes(n) ? 'r' : 'b'}`;
                cell.innerText = n;
                cell.onclick = () => track(n);
                grid.appendChild(cell);
            });
        });
    }

    function track(num) {
        let range = "None";
        if (num >= 1 && num <= 18) range = "LOW";
        if (num >= 19 && num <= 36) range = "HIGH";
        if (num === 0) range = "ZERO";

        let distance = null;
        
        // Find the last number regardless of range to calculate travel distance
        if (history.length > 0) {
            const lastNum = history[history.length - 1].num;
            distance = (wheelOrder.indexOf(num) - wheelOrder.indexOf(lastNum) + 37) % 37;
        }

        history.push({ num, range, dist: distance });
        process();
    }

    function process() {
        // Filter history by range
        const lowDists = history.filter(h => h.range === "LOW" && h.dist !== null).map(h => h.dist);
        const highDists = history.filter(h => h.range === "HIGH" && h.dist !== null).map(h => h.dist);

        const avgLow = lowDists.length ? (lowDists.reduce((a,b) => a+b, 0) / lowDists.length) : 0;
        const avgHigh = highDists.length ? (highDists.reduce((a,b) => a+b, 0) / highDists.length) : 0;

        const lastNum = history[history.length - 1].num;
        const lastIdx = wheelOrder.indexOf(lastNum);

        // Calculate Predictions
        const predLowIdx = (lastIdx + Math.round(avgLow)) % 37;
        const predHighIdx = (lastIdx + Math.round(avgHigh)) % 37;

        updateUI({
            predLow: lowDists.length > 0 ? wheelOrder[predLowIdx] : "--",
            predHigh: highDists.length > 0 ? wheelOrder[predHighIdx] : "--",
            avgLow,
            avgHigh,
            lastNum
        });
    }

    function updateUI(data) {
        document.getElementById('target-low').innerText = data.predLow;
        document.getElementById('target-high').innerText = data.predHigh;
        document.getElementById('avg-low').innerText = data.avgLow.toFixed(2);
        document.getElementById('avg-high').innerText = data.avgHigh.toFixed(2);
        document.getElementById('last-hit-display').innerText = data.lastNum;

        const tbody = document.getElementById('logTable');
        tbody.innerHTML = '';
        [...history].reverse().forEach((entry, i) => {
            const spinNo = history.length - i;
            const rangeClass = entry.range === "LOW" ? "low-color" : (entry.range === "HIGH" ? "high-color" : "");
            tbody.innerHTML += `
                <tr>
                    <td>${spinNo}</td>
                    <td><b>${entry.num}</b></td>
                    <td class="${rangeClass}">${entry.range}</td>
                    <td>${entry.dist !== null ? entry.dist : '-'}</td>
                </tr>`;
        });
    }

    function importHistory() {
        const raw = document.getElementById('bulkData').value;
        const nums = raw.split(/[\s,]+/).map(Number).filter(n => !isNaN(n) && n >= 0 && n <= 36);
        nums.forEach(n => track(n));
        document.getElementById('bulkData').value = '';
    }

    function resetSession() {
        history = [];
        document.getElementById('target-low').innerText = "--";
        document.getElementById('target-high').innerText = "--";
        document.getElementById('avg-low').innerText = "0.0";
        document.getElementById('avg-high').innerText = "0.0";
        document.getElementById('logTable').innerHTML = "";
        document.getElementById('last-hit-display').innerText = "None";
    }

    buildBoard();
</script>
</body>
</html>
