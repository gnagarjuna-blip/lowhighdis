<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roulette Straight Up - Collective Neighbor Engine</title>
    <style>
        :root { --bg: #05070f; --panel: #0b111e; --accent: #38bdf8; --green: #10b981; --red: #ef4444; --black: #010206; --text: #f1f5f9; --gold: #fbbf24; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .dashboard { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: 1fr 450px; gap: 20px; }
        
        .setup-panel { background: var(--panel); border: 1px solid #1e293b; padding: 20px; border-radius: 12px; grid-column: 1 / -1; }
        .textarea-input { width: 100%; height: 80px; background: #05070f; border: 1px solid #334155; border-radius: 6px; color: white; padding: 10px; resize: none; font-size: 1.1rem; }
        
        .hero { background: #0b111e; border: 2px solid var(--accent); border-radius: 15px; padding: 20px; text-align: center; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .predict-box { background: #05070f; padding: 15px; border-radius: 10px; border: 1px solid #1e293b; }
        .predict-title { font-size: 0.8rem; text-transform: uppercase; color: var(--accent); letter-spacing: 1px; margin-bottom: 10px; }
        .num-list { font-size: 1.2rem; font-weight: 700; color: var(--gold); word-wrap: break-word; line-height: 1.4; }

        .roulette-container { background: #064e3b; padding: 15px; border-radius: 12px; display: flex; border: 4px solid #065f46; margin-bottom: 20px; }
        .zero-cell { width: 60px; background: var(--green); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; cursor: pointer; border-radius: 6px 0 0 6px; }
        .grid-rows { display: flex; flex-direction: column; gap: 4px; flex-grow: 1; margin-left: 4px; }
        .grid-row { display: grid; grid-template-columns: repeat(12, 1fr); gap: 4px; }
        .grid-cell { height: 50px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1); }
        .r-num { background: var(--red); color: white; }
        .b-num { background: var(--black); color: white; }

        .log-area { height: 500px; overflow-y: auto; background: #05070f; border-radius: 8px; border: 1px solid #1e293b; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1e293b; padding: 12px; color: var(--accent); font-size: 0.8rem; text-transform: uppercase; position: sticky; top: 0; }
        td { padding: 10px; border-bottom: 1px solid #1e293b; text-align: center; font-size: 0.9rem; }
        
        .btn { padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        .btn-blue { background: var(--accent); color: #000; }
        .btn-red { background: var(--red); color: #fff; width: 100%; margin-top: 15px; }
        .stat-count { font-size: 0.8rem; color: #94a3b8; margin-top: 5px; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="setup-panel">
        <h2 style="margin:0 0 10px 0; font-size: 1rem; color: var(--accent);">1. INPUT HISTORY STREAM</h2>
        <textarea id="bulkData" class="textarea-input" placeholder="Paste sequential numbers (e.g. 10, 22, 5, 10, 31...)"></textarea>
        <div style="margin-top:10px;">
            <button class="btn btn-blue" onclick="syncHistory()">SYNC & GENERATE NEIGHBORS</button>
        </div>
    </div>

    <div>
        <div class="hero">
            <div class="predict-box">
                <div class="predict-title">Left Side Neighbors (Sorted)</div>
                <div id="left-nos" class="num-list">--</div>
                <div id="left-count" class="stat-count">0 hits found</div>
            </div>
            <div class="predict-box">
                <div class="predict-title">Right Side Neighbors (Sorted)</div>
                <div id="right-nos" class="num-list">--</div>
                <div id="right-count" class="stat-count">0 hits found</div>
            </div>
        </div>

        <div class="roulette-container">
            <div class="zero-cell" onclick="addNumber(0)">0</div>
            <div id="rouletteGrid" class="grid-rows"></div>
        </div>
        <p style="text-align: center; opacity: 0.5; font-size: 0.8rem;">Click a number above to set it as the "Active Pivot"</p>
    </div>

    <div class="panel" style="background: var(--panel); padding:20px; border-radius:12px; border: 1px solid #1e293b;">
        <h3 style="margin-top:0; color:var(--accent); font-size: 1rem;">COLLECTIVE LOG</h3>
        <div class="log-area">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Pivot</th>
                        <th>Left Collect</th>
                        <th>Right Collect</th>
                    </tr>
                </thead>
                <tbody id="logBody"></tbody>
            </table>
        </div>
        <button class="btn btn-red" onclick="resetAll()">PURGE ALL DATA</button>
    </div>
</div>

<script>
    const reds = [1, 3, 5, 7, 9, 12, 14, 16, 18, 19, 21, 23, 25, 27, 30, 32, 34, 36];
    let history = [];

    function buildGrid() {
        const grid = document.getElementById('rouletteGrid');
        const layout = [
            [3, 6, 9, 12, 15, 18, 21, 24, 27, 30, 33, 36],
            [2, 5, 8, 11, 14, 17, 20, 23, 26, 29, 32, 35],
            [1, 4, 7, 10, 13, 16, 19, 22, 25, 28, 31, 34]
        ];
        layout.forEach(row => {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'grid-row';
            row.forEach(n => {
                const cell = document.createElement('div');
                cell.className = `grid-cell ${reds.includes(n) ? 'r-num' : 'b-num'}`;
                cell.innerText = n;
                cell.onclick = () => addNumber(n);
                rowDiv.appendChild(cell);
            });
            grid.appendChild(rowDiv);
        });
    }

    function syncHistory() {
        const val = document.getElementById('bulkData').value.trim();
        if (!val) return;
        history = val.split(/[\s,]+/).map(Number).filter(n => !isNaN(n));
        calculateNeighbors();
    }

    function addNumber(n) {
        history.push(n);
        calculateNeighbors();
    }

    function calculateNeighbors() {
        if (history.length === 0) return;
        
        const pivot = history[history.length - 1];
        let leftCollect = [];
        let rightCollect = [];

        // Scan history for the pivot (excluding the very last one we just added)
        for (let i = 0; i < history.length - 1; i++) {
            if (history[i] === pivot) {
                // If matched, grab the number to its left
                if (i > 0) leftCollect.push(history[i - 1]);
                // Grab the number to its right
                if (i < history.length - 1) rightCollect.push(history[i + 1]);
            }
        }

        // Sort Ascending
        leftCollect.sort((a, b) => a - b);
        rightCollect.sort((a, b) => a - b);

        // Update Hero UI
        document.getElementById('left-nos').innerText = leftCollect.length > 0 ? leftCollect.join(', ') : '--';
        document.getElementById('right-nos').innerText = rightCollect.length > 0 ? rightCollect.join(', ') : '--';
        document.getElementById('left-count').innerText = `${leftCollect.length} hits found for Pivot [${pivot}]`;
        document.getElementById('right-count').innerText = `${rightCollect.length} hits found for Pivot [${pivot}]`;

        updateLog(pivot, leftCollect, rightCollect);
    }

    function updateLog(pivot, left, right) {
        const tbody = document.getElementById('logBody');
        const row = `<tr>
            <td>${history.length}</td>
            <td style="font-weight:bold; color:var(--accent)">${pivot}</td>
            <td style="color:#94a3b8; font-size:0.8rem;">${left.join(', ') || '-'}</td>
            <td style="color:#94a3b8; font-size:0.8rem;">${right.join(', ') || '-'}</td>
        </tr>`;
        tbody.insertAdjacentHTML('afterbegin', row);
    }

    function resetAll() {
        history = [];
        document.getElementById('bulkData').value = '';
        document.getElementById('left-nos').innerText = '--';
        document.getElementById('right-nos').innerText = '--';
        document.getElementById('logBody').innerHTML = '';
        document.getElementById('left-count').innerText = '0 hits found';
        document.getElementById('right-count').innerText = '0 hits found';
    }

    buildGrid();
</script>
</body>
</html>
