<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roulette DS - Cluster Window Engine</title>
    <style>
        :root { --bg: #05070f; --panel: #0b111e; --accent: #38bdf8; --green: #10b981; --red: #ef4444; --black: #010206; --text: #f1f5f9; --gold: #fbbf24; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .dashboard { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 420px; gap: 20px; }
        
        .setup-panel { background: var(--panel); border: 1px solid #1e293b; padding: 20px; border-radius: 12px; grid-column: 1 / -1; }
        .textarea-input { width: 100%; height: 80px; background: #05070f; border: 1px solid #334155; border-radius: 6px; color: white; padding: 10px; resize: none; font-size: 1.1rem; box-sizing: border-box;}
        
        .prediction-hero { background: linear-gradient(145deg, #0b111e, #1c2538); border: 2px solid var(--accent); border-radius: 15px; padding: 25px; text-align: center; margin-bottom: 20px; }
        .ds-display { display: flex; justify-content: center; gap: 30px; margin-top: 15px; }
        .ds-card { background: #05070f; padding: 20px; border-radius: 12px; border: 1px solid var(--accent); min-width: 160px; }
        .ds-label { font-size: 0.75rem; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; font-weight: bold; }
        .ds-value { font-size: 2.8rem; font-weight: 800; color: var(--gold); }

        .roulette-container { background: #064e3b; padding: 15px; border-radius: 12px; display: flex; border: 4px solid #065f46; margin-bottom: 20px; }
        .zero-cell { width: 60px; background: var(--green); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; cursor: pointer; border-radius: 6px 0 0 6px; }
        .grid-rows { display: flex; flex-direction: column; gap: 4px; flex-grow: 1; margin-left: 4px; }
        .grid-row { display: grid; grid-template-columns: repeat(12, 1fr); gap: 4px; }
        .grid-cell { height: 45px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1); }
        .r-num { background: var(--red); }
        .b-num { background: var(--black); }

        .log-area { height: 400px; overflow-y: auto; background: #05070f; border-radius: 8px; border: 1px solid #1e293b; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1e293b; padding: 12px; color: var(--accent); font-size: 0.7rem; position: sticky; top: 0; }
        td { padding: 10px; border-bottom: 1px solid #1e293b; text-align: center; font-size: 0.8rem; }
        
        .btn { padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-blue { background: var(--accent); color: #000; }
        .btn-red { background: var(--red); color: #fff; width: 100%; margin-top: 10px; }
        .highlight-text { color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="setup-panel">
        <h2 style="margin:0 0 10px 0; font-size: 0.9rem; color: var(--accent);">INPUT HISTORY STREAM</h2>
        <textarea id="bulkData" class="textarea-input" placeholder="Example: 12 13 26 23 4 10 29 12 28 20..."></textarea>
        <div style="margin-top:10px;">
            <button class="btn btn-blue" onclick="syncHistory()">SYNC DATA</button>
        </div>
    </div>

    <div>
        <div class="prediction-hero">
            <h3 style="margin:0; font-size: 0.8rem; letter-spacing: 2px; color: #94a3b8;">CLUSTER WINDOW PREDICTION (±4)</h3>
            <div class="ds-display">
                <div class="ds-card">
                    <div class="ds-label">Low DS (1-3)</div>
                    <div id="low-ds" class="ds-value">--</div>
                </div>
                <div class="ds-card">
                    <div class="ds-label">High DS (4-6)</div>
                    <div id="high-ds" class="ds-value">--</div>
                </div>
            </div>
            <p id="status-msg" style="margin-top:15px; font-size: 0.8rem; color: var(--accent);">Enter Pivot Number</p>
        </div>

        <div class="roulette-container">
            <div class="zero-cell" onclick="addNumber(0)">0</div>
            <div id="rouletteGrid" class="grid-rows"></div>
        </div>
    </div>

    <div class="panel" style="background: var(--panel); padding:20px; border-radius:12px; border: 1px solid #1e293b;">
        <h3 style="margin-top:0; color:var(--accent); font-size: 0.9rem;">CLUSTER ANALYSIS LOG</h3>
        <div class="log-area">
            <table>
                <thead>
                    <tr>
                        <th>Pivot</th>
                        <th>Surrounding Window</th>
                        <th>Low/High</th>
                    </tr>
                </thead>
                <tbody id="logBody"></tbody>
            </table>
        </div>
        <button class="btn btn-red" onclick="resetAll()">RESET ALL</button>
    </div>
</div>

<script>
    const reds = [1, 3, 5, 7, 9, 12, 14, 16, 18, 19, 21, 23, 25, 27, 30, 32, 34, 36];
    let history = [];

    function buildGrid() {
        const grid = document.getElementById('rouletteGrid');
        const layout = [[3, 6, 9, 12, 15, 18, 21, 24, 27, 30, 33, 36],[2, 5, 8, 11, 14, 17, 20, 23, 26, 29, 32, 35],[1, 4, 7, 10, 13, 16, 19, 22, 25, 28, 31, 34]];
        layout.forEach(row => {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'grid-row';
            row.forEach(n => {
                const cell = document.createElement('div');
                cell.className = `grid-cell ${reds.includes(n) ? 'r-num' : 'b-num'}`;
                cell.innerText = n;
                cell.onclick = () => addNumber(n);
                rowDiv.appendChild(cell);
            });
            grid.appendChild(rowDiv);
        });
    }

    function getDS(n) {
        if (n === 0 || n === null) return null;
        return Math.ceil(n / 6);
    }

    function syncHistory() {
        const val = document.getElementById('bulkData').value.trim();
        if (!val) return;
        history = val.split(/[\s,]+/).map(Number).filter(n => !isNaN(n));
        processLogic();
    }

    function addNumber(n) {
        history.push(n);
        document.getElementById('bulkData').value = history.join(' ');
        processLogic();
    }

    function processLogic() {
        if (history.length < 2) return;
        
        const pivot = history[history.length - 1];
        let clusterWindow = [];
        let foundIndex = -1;

        // Search for the previous occurrence of this pivot
        for (let i = history.length - 2; i >= 0; i--) {
            if (history[i] === pivot) {
                foundIndex = i;
                break; // Found the most recent instance in history
            }
        }

        if (foundIndex === -1) {
            document.getElementById('status-msg').innerText = `Pivot [${pivot}] is new to history.`;
            return;
        }

        // Collect the window: 4 before and 4 after the foundIndex
        let windowNumbers = [];
        for (let j = foundIndex - 4; j <= foundIndex + 4; j++) {
            if (j >= 0 && j < history.length - 1) { // Stay within bounds, exclude current entry
                if (j !== foundIndex) { // Exclude the pivot itself from the DS count
                    windowNumbers.push(history[j]);
                }
            }
        }

        const dsList = windowNumbers.map(n => getDS(n)).filter(d => d !== null);
        const lowList = dsList.filter(d => d <= 3);
        const highList = dsList.filter(d => d >= 4);

        const bestLow = getMostFrequent(lowList);
        const bestHigh = getMostFrequent(highList);

        // UI Update
        document.getElementById('low-ds').innerText = bestLow || '--';
        document.getElementById('high-ds').innerText = bestHigh || '--';
        document.getElementById('status-msg').innerText = `Found cluster around ${pivot} at position ${foundIndex + 1}`;

        updateLog(pivot, windowNumbers, bestLow, bestHigh);
    }

    function getMostFrequent(arr) {
        if (arr.length === 0) return null;
        const counts = {};
        let maxCount = 0;
        let result = arr[0];
        
        for (const val of arr) {
            counts[val] = (counts[val] || 0) + 1;
            if (counts[val] > maxCount) {
                maxCount = counts[val];
                result = val;
            }
        }
        return result;
    }

    function updateLog(pivot, windowArr, low, high) {
        const tbody = document.getElementById('logBody');
        const row = `<tr>
            <td class="highlight-text">${pivot}</td>
            <td style="font-size:0.75rem; color:#94a3b8">${windowArr.join(' → ')}</td>
            <td class="highlight-text">L${low || '-'} / H${high || '-'}</td>
        </tr>`;
        tbody.insertAdjacentHTML('afterbegin', row);
    }

    function resetAll() {
        history = [];
        document.getElementById('bulkData').value = '';
        document.getElementById('low-ds').innerText = '--';
        document.getElementById('high-ds').innerText = '--';
        document.getElementById('logBody').innerHTML = '';
        document.getElementById('status-msg').innerText = 'System Reset';
    }

    buildGrid();
</script>
</body>
</html>
